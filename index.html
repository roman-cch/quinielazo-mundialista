<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quinielazo">
<meta name="theme-color" content="#0b0b0f">
<title>Quinielazo Mundialista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0f; --panel:#15151c; --panel2:#1d1d27; --line:#2a2a36;
  --pink:#ed1b76; --pink2:#ff2e8e; --teal:#1fb89b; --teal2:#15d6a8;
  --navy:#0e1a3f; --blue:#3a5bd9; --blue2:#5b7cff;
  --gold:#f4c20d; --txt:#f3f0ee; --mut:#9a96a6; --ok:#27c08a; --bad:#ff5577;
  --safetop: max(env(safe-area-inset-top), 34px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;color:var(--txt);
  font-family:"Exo 2",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;overscroll-behavior:none}
html{background:var(--bg)}
body{padding-bottom:116px;max-width:760px;margin:0 auto;min-height:100vh;
  background:
    radial-gradient(120% 55% at 50% -8%,rgba(237,27,118,.17),transparent 55%),
    radial-gradient(85% 50% at -5% 22%,rgba(58,91,217,.16),transparent 55%),
    radial-gradient(95% 45% at 105% 104%,rgba(31,184,155,.14),transparent 55%),
    linear-gradient(180deg,#0c1330 0%,#0a0a16 42%,#08080d 100%)}
.shapes{position:fixed;inset:0;pointer-events:none;opacity:.05;z-index:0;overflow:hidden}
.shapes span{position:absolute;color:var(--pink);font-size:120px;line-height:1}
.wrap{position:relative;z-index:1}
header{padding:calc(var(--safetop) + 56px) 16px 12px;text-align:center;background:radial-gradient(120% 120% at 50% -20%, rgba(237,27,118,.22), transparent 60%)}
header .sym{letter-spacing:10px;font-size:18px}
header .sym span:nth-child(1){color:var(--pink2);text-shadow:0 0 12px rgba(255,46,142,.8)}
header .sym span:nth-child(2){color:var(--teal2);text-shadow:0 0 12px rgba(21,214,168,.8)}
header .sym span:nth-child(3){color:var(--blue2);text-shadow:0 0 12px rgba(91,124,255,.85)}
header h1{margin:6px 0 2px;font-family:"Audiowide",sans-serif;font-size:21px;font-weight:400;letter-spacing:1px;
  background:linear-gradient(180deg,#fff,#ffc8e1);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 11px rgba(237,27,118,.5)) drop-shadow(0 0 20px rgba(91,124,255,.28))}
header p{margin:0;color:var(--mut);font-size:12px}
.btnfs,.btngear{position:absolute;top:calc(var(--safetop) + 14px);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid rgba(91,124,255,.3);color:var(--txt);border-radius:11px;padding:7px 9px;font-size:15px;line-height:1;z-index:2;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.btnfs,.btngear{color:#eaf0ff}
.btngear svg{display:block;filter:drop-shadow(0 0 5px rgba(91,124,255,.55)) drop-shadow(0 0 9px rgba(255,46,142,.25))}
.btnfs{left:14px}
.btngear{right:11px;background:none;border:0;border-radius:0;padding:5px;backdrop-filter:none;-webkit-backdrop-filter:none}
.btngear svg{width:23px;height:23px}
.btngear.on{color:#fff}
.btngear.on svg{filter:drop-shadow(0 0 6px rgba(255,46,142,.85)) drop-shadow(0 0 12px rgba(255,46,142,.45))}
.gearwrap{position:fixed;inset:0;z-index:40}
.gearwrap[hidden]{display:none}
.gearback{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.gearmenu{position:absolute;top:calc(var(--safetop) + 52px);right:12px;min-width:215px;background:linear-gradient(180deg,var(--panel2),#14141c);border:1px solid var(--line);border-radius:14px;padding:6px;box-shadow:0 16px 44px rgba(0,0,0,.6),0 0 0 1px rgba(255,46,142,.15) inset;animation:fade .15s}
.gearmenu button{display:flex;align-items:center;gap:11px;width:100%;background:none;border:0;color:var(--txt);padding:13px 12px;font-size:15px;font-weight:600;border-radius:10px;text-align:left}
.gearmenu button:active{background:var(--panel)}
.gearmenu button .gi{font-size:19px;color:var(--pink2);width:22px;text-align:center}
.cog{width:1em;height:1em;vertical-align:-.15em;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.gearmenu button .gi .cog{width:20px;height:20px}
.tri{width:1em;height:1em;vertical-align:-.12em;fill:none;stroke:var(--teal2);stroke-width:1.9;stroke-linejoin:round;filter:drop-shadow(0 0 4px rgba(21,214,168,.6))}
.sec .tri{width:1.1em;height:1.1em}
.gearmenu button .gi .tri{width:20px;height:20px}
/* Barra transparente: las píldoras flotan sobre el contenido (sin fondo) */
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:22px;z-index:30;max-width:760px;margin:0 auto;
  padding:10px 18px calc(16px + env(safe-area-inset-bottom));
  background:none;border:0;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none;pointer-events:none}
/* Píldoras cápsula translúcidas, simétricas, letra Audiowide grande, brillo bajo */
.tabbar button{pointer-events:auto;flex:1 1 0;min-width:0;max-width:230px;
  border-radius:999px;color:#fff;white-space:nowrap;
  font-family:"Audiowide",sans-serif;font-size:14px;line-height:1;font-weight:400;letter-spacing:.4px;
  padding:17px 14px;text-align:center;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(11px) saturate(1.4);-webkit-backdrop-filter:blur(11px) saturate(1.4);
  transition:transform .15s,box-shadow .18s,background .18s,color .18s}
.tabbar button:active{transform:scale(.96)}
/* Ranking = turquesa/azul · Pronósticos = rosa. Tinte translúcido; algo más al activar */
.tabbar button[data-t="rank"]{color:#cdfdef;
  background:linear-gradient(180deg,rgba(31,184,155,.26),rgba(58,91,217,.2));
  border:1px solid rgba(21,214,168,.5);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.26) inset}
.tabbar button[data-t="prons"]{color:#ffd2e7;
  background:linear-gradient(180deg,rgba(237,27,118,.26),rgba(138,26,208,.2));
  border:1px solid rgba(255,46,142,.5);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.26) inset}
.tabbar button[data-t="rank"].on{color:#fff;
  background:linear-gradient(180deg,rgba(31,184,155,.5),rgba(58,91,217,.42));
  border-color:rgba(21,214,168,.8);
  box-shadow:0 2px 10px rgba(0,0,0,.32),0 0 12px rgba(31,184,155,.26),0 1px 0 rgba(255,255,255,.38) inset}
.tabbar button[data-t="prons"].on{color:#fff;
  background:linear-gradient(180deg,rgba(237,27,118,.5),rgba(138,26,208,.42));
  border-color:rgba(255,46,142,.8);
  box-shadow:0 2px 10px rgba(0,0,0,.32),0 0 12px rgba(237,27,118,.28),0 1px 0 rgba(255,255,255,.38) inset}
.view{padding:14px 14px 24px;display:none}
.view.on{display:block;animation:fade .2s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.card{background:linear-gradient(180deg,#16161f,#101019);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 16px rgba(0,0,0,.3),0 0 0 1px rgba(91,124,255,.05),0 0 22px rgba(58,91,217,.04)}
h2.sec{font-family:"Audiowide",sans-serif;font-size:12px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink2);margin:2px 0 12px;display:flex;align-items:center;gap:8px;text-shadow:0 0 14px rgba(255,46,142,.55)}
.dorsal{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:26px;border-radius:14px;background:rgba(31,184,155,.16);color:#bdffe9;border:1px solid #1fb89b66;font-weight:800;font-size:12px;padding:0 8px;font-variant-numeric:tabular-nums;box-shadow:0 0 10px rgba(31,184,155,.2),0 1px 0 rgba(255,255,255,.08) inset;text-shadow:0 0 8px rgba(21,214,168,.45)}
.dorsal .dot{margin-right:5px;font-size:10px;line-height:1;color:var(--pink2);text-shadow:0 0 7px rgba(255,46,142,.7)}
select,input{background:rgba(29,29,39,.6);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:10px;font-size:15px;width:100%;font-family:inherit}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 1px rgba(255,46,142,.35),0 0 14px rgba(237,27,118,.22)}
.row{display:flex;gap:8px;align-items:center}
/* Botones translúcidos con brillo bajo, a juego con las píldoras */
.btn{background:linear-gradient(180deg,rgba(237,27,118,.32),rgba(138,26,208,.24));color:#fff;border:1px solid rgba(255,46,142,.55);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:700;width:100%;letter-spacing:.3px;
  backdrop-filter:blur(8px) saturate(1.3);-webkit-backdrop-filter:blur(8px) saturate(1.3);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 0 12px rgba(237,27,118,.16),0 1px 0 rgba(255,255,255,.26) inset;transition:transform .15s,box-shadow .18s}
.btn:active{transform:scale(.98)}
.btn.alt{background:linear-gradient(180deg,rgba(31,184,155,.32),rgba(58,91,217,.24));border-color:rgba(21,214,168,.55);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 0 12px rgba(31,184,155,.16),0 1px 0 rgba(255,255,255,.26) inset}
.btn.ghost{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.btn.danger{background:rgba(255,85,119,.14);border:1px solid rgba(255,85,119,.45);color:#ff9db1;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.muted{color:var(--mut);font-size:12px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:6px 0 14px}
.pod{flex:1;max-width:130px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));border:1px solid var(--line);border-radius:14px 14px 0 0;text-align:center;padding:10px 6px}
.pod .nm{font-weight:700;font-size:13px;margin:6px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod .pt{color:var(--gold);font-weight:800;text-shadow:0 0 10px rgba(244,194,13,.45)}
.pod.p1{order:2;border-color:rgba(244,194,13,.7);box-shadow:0 0 0 1px rgba(244,194,13,.5) inset,0 0 22px rgba(244,194,13,.2);padding-bottom:26px}
.pod.p2{order:1;padding-bottom:14px}
.pod.p3{order:3}
.pod .medal{font-family:"Audiowide",sans-serif;font-size:22px;color:var(--gold);text-shadow:0 0 14px rgba(244,194,13,.75);line-height:1}
.st{display:inline-block;font-family:"Exo 2",sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:6px;vertical-align:middle}
.st-lock{color:#9fb0ff;background:rgba(58,91,217,.16);border:1px solid rgba(91,124,255,.4);text-shadow:0 0 8px rgba(91,124,255,.5)}
.st-edit{color:#7ff0d4;background:rgba(31,184,155,.16);border:1px solid rgba(21,214,168,.4);text-shadow:0 0 8px rgba(21,214,168,.5)}
.esp{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;color:var(--gold);border:1px solid rgba(244,194,13,.5);border-radius:5px;padding:0 5px;margin-left:4px;text-shadow:0 0 8px rgba(244,194,13,.5)}
.rkrow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.rkrow:last-child{border:0}
.rkpos{width:24px;text-align:center;font-weight:800;color:var(--mut)}
.rknm{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rkpt{font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;text-shadow:0 0 9px rgba(244,194,13,.4)}
.tag10{background:#3a2a05;color:var(--gold);border:1px solid #f4c20d55;border-radius:8px;font-size:10px;padding:2px 6px;font-weight:700}
.acc{border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden;background:rgba(255,255,255,.012);transition:border-color .18s,box-shadow .18s}
.acc.open{border-color:rgba(255,46,142,.32);box-shadow:0 0 16px rgba(237,27,118,.1)}
.acc>.h{display:flex;align-items:center;justify-content:space-between;padding:12px;background:linear-gradient(180deg,rgba(29,29,39,.9),rgba(20,20,28,.85));cursor:pointer;gap:8px}
.acc>.h .t{font-weight:700}
.acc>.h .meta{color:var(--mut);font-size:12px}
.acc>.b{display:none;padding:8px 10px 12px}
.acc.open>.b{display:block}
.acc.open>.h .chev{transform:rotate(180deg)}
.chev{transition:.15s;color:var(--mut)}
.match{padding:9px 4px;border-bottom:1px solid var(--line)}
.match:last-child{border:0}
.mt{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.mt .gr{color:var(--pink2);font-weight:800;font-size:11px;width:28px}
.mt .nm{flex:1;font-size:14px}
.mt .star{color:var(--gold);font-size:12px}
.picks{display:flex;gap:6px}
.pk{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:10px 0;font-weight:800;text-align:center;font-size:15px;transition:.15s}
.pk.on{background:linear-gradient(180deg,rgba(237,27,118,.55),rgba(138,26,208,.4));border-color:rgba(255,46,142,.7);color:#fff;box-shadow:0 0 14px rgba(237,27,118,.35),0 1px 0 rgba(255,255,255,.25) inset}
.exact{display:flex;gap:6px;align-items:center;justify-content:flex-end}
.exact input{width:46px;text-align:center;padding:8px 0;font-weight:800}
.res{font-size:11px;color:var(--mut);margin-top:5px}
.res b{color:var(--txt)}
.chip{display:inline-block;font-size:11px;padding:2px 7px;border-radius:8px;margin-left:6px}
.chip.ok{background:#0e3a2c;color:#7ff0c4}
.chip.no{background:#3a1620;color:#ff8aa3}
.chip.wait{background:#26262f;color:var(--mut)}
.bigpts{font-size:14px;color:var(--gold);font-weight:800;text-shadow:0 0 10px rgba(244,194,13,.45)}
.notice{background:rgba(237,27,118,.1);border:1px solid rgba(237,27,118,.35);color:#ffc4dd;border-radius:12px;padding:11px;font-size:12px;margin-bottom:10px;box-shadow:0 0 16px rgba(237,27,118,.12)}
.tline{height:1px;background:var(--line);margin:12px 0}
.kvr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px}
.kvr:last-child{border:0}
.kvr b{color:var(--gold)}
.bx{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:11px;padding:8px 10px;margin-bottom:6px}
.bx .tm{flex:1;font-size:14px}
.bx .tm.win{color:var(--teal2);font-weight:700;text-shadow:0 0 10px rgba(21,214,168,.5)}
.bx button{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:6px 9px;font-size:12px;white-space:nowrap}
.bx button.sel{background:linear-gradient(180deg,rgba(244,194,13,.85),rgba(244,194,13,.68));border-color:var(--gold);color:#2a1d03;font-weight:800;box-shadow:0 0 12px rgba(244,194,13,.4)}
.bx button.selg{background:linear-gradient(180deg,rgba(21,214,168,.6),rgba(31,184,155,.5));border-color:var(--teal);color:#03241d;font-weight:800;box-shadow:0 0 12px rgba(31,184,155,.35)}
.rndlbl{color:var(--pink2);font-weight:800;font-size:12px;letter-spacing:1.5px;margin:14px 0 6px;text-transform:uppercase;text-shadow:0 0 10px rgba(255,46,142,.4)}
textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px;font-size:14px;width:100%;font-family:inherit;min-height:90px;resize:vertical}
label.fld{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(21,214,168,.92),rgba(31,184,155,.85));color:#03241d;font-weight:700;padding:11px 18px;border-radius:999px;z-index:120;opacity:0;transition:.25s;pointer-events:none;max-width:90%;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 8px 26px rgba(0,0,0,.4),0 0 18px rgba(31,184,155,.45)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.empty{text-align:center;color:var(--mut);padding:30px 10px;font-size:13px}
.subhead{font-weight:700;font-size:14px;margin:14px 0 8px;color:#e7ecff;padding-left:10px;border-left:3px solid var(--pink);line-height:1.25}
/* Puerta de autenticación: tapa toda la app hasta que hay sesión */
.authgate{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;
  padding-top:calc(var(--safetop) + 24px);overflow:auto;
  background:radial-gradient(120% 60% at 50% -8%,rgba(237,27,118,.2),transparent 55%),linear-gradient(180deg,#0c1330 0%,#0a0a16 45%,#08080d 100%)}
.authgate.show{display:flex}
.authgate .authbox{width:100%;max-width:380px;background:linear-gradient(180deg,#16161f,#101019);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 16px 44px rgba(0,0,0,.6),0 0 0 1px rgba(255,46,142,.12) inset}
.authgate .sym{text-align:center;letter-spacing:10px;font-size:18px}
.authgate .sym span:nth-child(1){color:var(--pink2)}.authgate .sym span:nth-child(2){color:var(--teal2)}.authgate .sym span:nth-child(3){color:var(--blue2)}
.authgate h1{margin:8px 0 10px;text-align:center;font-family:"Audiowide",sans-serif;font-size:22px;font-weight:400;letter-spacing:1px;
  background:linear-gradient(180deg,#fff,#ffc8e1);-webkit-background-clip:text;background-clip:text;color:transparent}
.authgate .hint{font-size:11px;color:var(--mut);margin:5px 2px 2px;line-height:1.35}
.authgate code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:5px;font-size:12px}
.pwwrap{position:relative}
.pwwrap input{padding-right:46px}
.pwwrap .eye{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--mut);font-size:19px;line-height:1;padding:6px 7px;cursor:pointer}
.autherr{min-height:16px;margin-top:10px;font-size:13px;line-height:1.35;text-align:center}
.autherr.bad{color:#ff9db1}
.autherr.info{color:#9fb0ff}
</style>
</head>
<body>
<div class="shapes"><span style="top:6%;left:-2%">○</span><span style="top:40%;right:-3%">△</span><span style="bottom:8%;left:4%">□</span></div>
<div class="wrap">
<header>
  <button class="btnfs" id="fsbtn" onclick="toggleFs()">⛶</button>
  <button class="btngear" id="gearbtn" onclick="toggleGear()" aria-label="Ajustes"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"/><path d="M19.4 13.5a1.6 1.6 0 0 0 .32 1.77l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.6 1.6 0 0 0-1.77-.32 1.6 1.6 0 0 0-.97 1.46V21a2 2 0 0 1-4 0v-.1a1.6 1.6 0 0 0-1.05-1.46 1.6 1.6 0 0 0-1.77.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.6 1.6 0 0 0 .32-1.77 1.6 1.6 0 0 0-1.46-.97H3a2 2 0 0 1 0-4h.1a1.6 1.6 0 0 0 1.46-1.05 1.6 1.6 0 0 0-.32-1.77l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.6 1.6 0 0 0 1.77.32H9a1.6 1.6 0 0 0 .97-1.46V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 .97 1.46 1.6 1.6 0 0 0 1.77-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.6 1.6 0 0 0-.32 1.77V9a1.6 1.6 0 0 0 1.46.97H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.46.97z"/></svg></button>
  <div class="sym"><span>○</span> <span>△</span> <span>□</span></div>
  <h1>QUINIELAZO MUNDIALISTA</h1>

/* ============ STORAGE (Firebase Realtime Database) ============ */
/* Reemplaza window.storage (artefacto de Claude) por Firebase RTDB.
   - Datos compartidos -> nodo /quiniela/<clave> (':' se codifica como '_').
   - Clave personal del dispositivo ("me", shared=false) -> localStorage.
   FBC es un espejo en memoria del nodo /quiniela, que el listener onValue
   (definido en el <script type="module"> de Firebase, al final) mantiene al día. */
let FBC={};                 // cache: clave_codificada -> valor (string JSON)
let FB_READY=false;
let _fbResolve; const FB_READY_P=new Promise(r=>_fbResolve=r);
const encKey=k=>k.replace(/:/g,"_");   // ':' no es válido en claves de Firebase
const decKey=k=>k.replace(/_/g,":");
function _waitFb(ms){return Promise.race([FB_READY_P,new Promise(r=>setTimeout(r,ms))]);}

// Lo invoca el módulo Firebase cada vez que cambian los datos compartidos (en vivo).
window.__fbApplySnapshot=function(data){
  FBC=data||{};
  if(!FB_READY){FB_READY=true;_fbResolve();return;}            // 1er snapshot: solo desbloquea init()
  loadAll().then(()=>{if(CURTAB==="rank")renderRank();});
};

async function sget(k,sh=SHARE){
  if(!sh){try{return localStorage.getItem("q_"+k);}catch(e){return null;}}
  await _waitFb(8000);
  const v=FBC[encKey(k)];return v==null?null:v;
}
async function sset(k,v,sh=SHARE){
  const val=typeof v==="string"?v:JSON.stringify(v);
  if(!sh){try{localStorage.setItem("q_"+k,val);return true;}catch(e){return false;}}
  await _waitFb(8000);
  FBC[encKey(k)]=val;                                          // optimista: refleja ya el cambio
  // Toda escritura pasa por el backend (Netlify), que verifica identidad y permisos
  // en el servidor. El cliente ya no escribe directo en la base de datos.
  try{
    const token=await window.__auth.getToken();
    if(!token)return false;
    const r=await fetch("/.netlify/functions/write",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:JSON.stringify({key:k,val})});
    return r.ok;
  }catch(e){return false;}
}

/* ============ SCORING ============ */
function parseScore(s){const m=/^(\d+)\s*-\s*(\d+)$/.exec((s||"").trim());return m?[+m[1],+m[2]]:null;}
function signOf(s){s=(s||"").trim().toLowerCase();if(s==="1"||s==="x"||s==="2")return s;const p=parseScore(s);return p?(p[0]>p[1]?"1":p[0]<p[1]?"2":"x"):null;}
function exactPts(pred,res,scale){
  const p=parseScore(pred),r=parseScore(res);if(!p||!r)return 0;
  const ex=scale?[10,5,2]:[5,3,1];
  if(p[0]===r[0]&&p[1]===r[1])return ex[0];
  const ps=p[0]>p[1]?"1":p[0]<p[1]?"2":"x", rs=r[0]>r[1]?"1":r[0]<r[1]?"2":"x";
  if(ps!==rs)return 0; if((p[0]-p[1])===(r[0]-r[1]))return ex[1]; return ex[2];
}
function jornadaScore(id,j){
  let pts=0,exact=0;

    if(!m.result)return;
    const pred=getPick(id,j.clave,idx);
    if(m.exact){const e=exactPts(pred,m.result,false);pts+=e;if(e===5)exact++;}
    else{const r=signOf(m.result),p=signOf(pred);if(r&&p&&r===p)pts++;}
  });
  return {pts,exact};
}

  const pk=pd.bracket.picks||{};let pts=0;const s=startIdx();
  for(let r=s;r<ROUNDS.length;r++){const real=(b.real.w[r]||{});
    for(let i=0;i<ROUNDS[r].size;i++){if(real[i]&&pk[r]&&pk[r][i]&&pk[r][i]===real[i])pts+=ROUNDS[r].pts;}}
  if(b.real.finalScore&&pd.bracket.bonus)pts+=exactPts(pd.bracket.bonus,b.real.finalScore,true);
  return {pts};
}
function sideScore(id){
  const res=ST.sidebet.results||{};let pts=0;
  SIDE.forEach(([k])=>{const a=(res[k]||"").trim().toLowerCase(),b=(sidePick(id,k)||"").trim().toLowerCase();if(a&&b&&a===b)pts+=10;});
  return pts;
}
function totalScore(id){
  let pts=0,exact=0,finalp=0;
  ST.jornadas.forEach(j=>{const s=jornadaScore(id,j);pts+=s.pts;exact+=s.exact;});
  const bs=bracketScore(id);pts+=bs.pts;finalp+=bs.pts;
  pts+=sideScore(id);
  return {pts,exact,finalp};
}
function ranking(){
  const arr=PLAYERS.map(p=>({...p,...totalScore(p.id)}));
  arr.sort((a,b)=>b.pts-a.pts||b.exact-a.exact||b.finalp-a.finalp||a.dorsal-b.dorsal);
  return arr;
}
function bestOfJornada(j){
  if(!j.matches.length||!j.matches.every(m=>m.result))return null;
  let best=-1,winners=[];
  PLAYERS.forEach(p=>{const s=jornadaScore(p.id,j).pts;if(s>best){best=s;winners=[p];}else if(s===best)winners.push(p);});
  return best>0?{best,winners}:null;
}

  const tot=totalScore(ME);
  h+=`<div class="card"><div class="row" style="justify-content:space-between"><div>${dch(byId[ME])} <b>${esc(byId[ME].name)}</b></div><div class="bigpts">${tot.pts} pts</div></div></div>`;

  /* --- Fase de grupos: una jornada por acordeón (abierta=editar, cerrada=solo ver) --- */
  ST.jornadas.slice().reverse().forEach((j,ri)=>{
    const closed=j.closeTime&&new Date(j.closeTime)<new Date();
    const s=jornadaScore(ME,j);
    const o=openAcc["pr"+j.clave]!==undefined?openAcc["pr"+j.clave]:(ri===0&&!closed);

    if(closed){
      j.matches.forEach((m,idx)=>{
        const pred=getPick(ME,j.clave,idx);let chip;
        if(!m.result)chip='<span class="chip wait">···</span>';
        else if(m.exact){const e=exactPts(pred,m.result,false);chip=e>0?`<span class="chip ok">✓ ${e}</span>`:'<span class="chip no">✗</span>';}
        else{const ok=signOf(pred)&&signOf(pred)===signOf(m.result);chip=ok?'<span class="chip ok">✓ 1</span>':'<span class="chip no">✗</span>';}
        h+=`<div class="match"><div class="mt"><span class="gr">${m.group}</span><span class="nm">${esc(m.home)} - ${esc(m.away)} ${m.exact?'<span class="star">★</span>':""}</span></div><div class="res">Tu pronóstico: <b>${esc(pred||"—")}</b> · Resultado: <b>${esc(m.result||"···")}</b> ${chip}</div></div>`;

      j.matches.forEach((m,idx)=>{

        else{h+='<div class="picks">'+["1","x","2"].map(x=>`<button class="pk ${pred===x?"on":""}" onclick="setPk(this)">${x.toUpperCase()}</button>`).join("")+'</div>';}
        h+='</div>';
      });
      h+=`<button class="btn" style="margin-top:10px" onclick="saveFill('${j.clave}',this)">Guardar mi quiniela</button>`;
    }
    h+='</div></div>';
  });

  /* --- Fase eliminatoria: una ronda por acordeón (abierta=editar, cerrada=solo ver) --- */
  const b=ST.bracket;
  if(b&&b.r16&&b.r16.length){
    const brClosed=b.closeTime&&new Date(b.closeTime)<new Date();
    const pd=pdataOf(ME);pd.bracket=pd.bracket||{picks:{},bonus:""};const pk=pd.bracket.picks;
    const st=startIdx();const act=ROUNDS.slice(st);
    let rounds=[b.r16.map(x=>[x.a,x.b])];
    for(let li=0;li<act.length-1;li++){const prev=rounds[li];const w=[];
      for(let i=0;i<prev.length;i++){let sel=(pk[st+li]||{})[i];if(sel&&prev[i].indexOf(sel)<0)sel=null;w.push(sel||null);}
      const nx=[];for(let i=0;i<w.length;i+=2)nx.push([w[i],w[i+1]]);rounds.push(nx);}
    h+='<div class="subhead">◇ Fase eliminatoria</div>';
    act.forEach((rd,li)=>{const r=st+li;
      const o=openAcc["br"+r]!==undefined?openAcc["br"+r]:false;
      h+=`<div class="acc ${o?"open":""}"><div class="h" onclick="tacc('br${r}')"><div><span class="t">${esc(rd.name)}</span> <span class="meta">${rd.pts} pts ${brClosed?'<span class="st st-lock">CERRADA</span>':'<span class="st st-edit">ABIERTA</span>'}</span></div><span class="chev">▾</span></div><div class="b">`;

          else h+=`<div class="bx"><div class="tm ${isSel?"win":""}">${esc(tm)}</div><button class="${isSel?"selg":""}" onclick="pickBr(${r},${i},'${esc(tm).replace(/'/g,"\\'")}')">${isSel?"✓ pasa":"pasa"}</button></div>`;});
        h+='</div>';});
      h+='</div></div>';
    });
    const bs=parseScore(pd.bracket.bonus);
    h+=`<div class="rndlbl">Bonus final · marcador exacto (10/5/2)</div><div class="exact" style="justify-content:flex-start"><input id="bonh" type="number" min="0" ${brClosed?"disabled":""} value="${bs?bs[0]:""}" style="width:54px"><span>-</span><input id="bona" type="number" min="0" ${brClosed?"disabled":""} value="${bs?bs[1]:""}" style="width:54px"></div>`;

  }

  h+=`<div class="acc ${oSB?"open":""}"><div class="h" onclick="tacc('prsb')"><div><span class="t">Premios individuales</span> <span class="meta">+10 cada acierto</span></div><span class="chev">▾</span></div><div class="b">`;

    h+=`<div class="kvr"><span>${lbl}</span><span>${esc(mine||"—")} ${chip}</span></div>`;});
  h+='</div></div>';

  $("v-prons").innerHTML=h;
}

function loadJEdit(){const v=$("jedit").value,del=$("jdelbtn"),btn=$("jsavebtn");
  if(v==="__new"){$("jname").value="";$("jclave").value="";$("jclave").disabled=false;$("jmatches").value="";$("jclose").value="";del.style.display="none";btn.textContent="Crear jornada";$("exactbox").innerHTML="";return;}
  const j=ST.jornadas.find(x=>x.clave===v);if(!j)return;
  $("jname").value=j.name;$("jclave").value=j.clave;$("jclave").disabled=true;
  $("jmatches").value=j.matches.map(m=>m.group+" "+m.home+"-"+m.away).join("\n");
  $("jclose").value=j.closeTime?j.closeTime.slice(0,16):"";

function onJmatches(){buildExactBox(parseMatchLines($("jmatches").value));}
function isSpain(m){return /españa/i.test(m.home)||/españa/i.test(m.away);}
function buildExactBox(matches){const box=$("exactbox");if(!matches.length){box.innerHTML="";return;}
  let h='<label class="fld">★ Toca para marcar los partidos a <b>resultado exacto</b> (5/3/1): el de <b>España</b> (se marca solo) y el <b>partido de la jornada</b> que elijáis.</label>';
  matches.forEach((m,i)=>{const on=m.exact||isSpain(m);
    h+=`<div class="bx"><div class="tm">${esc(m.group)} ${esc(m.home)} - ${esc(m.away)}${isSpain(m)?' <span class="esp">ESP</span>':''}</div><button class="${on?"sel":""}" data-ex="${i}" onclick="this.classList.toggle('sel')">★ exacto</button></div>`;});
  box.innerHTML=h;}
function parseMatchLines(txt){const out=[];txt.split("\n").forEach(line=>{line=line.trim();if(!line)return;
  const sp=line.indexOf(" ");if(sp<0)return;const group=line.slice(0,sp).trim(),rest=line.slice(sp+1).trim();
  const d=rest.indexOf("-");if(d<0)return;out.push({group,home:rest.slice(0,d).trim(),away:rest.slice(d+1).trim(),exact:false,tag:"",result:""});});return out;}
async function saveJornada(){
  const name=$("jname").value.trim(),clave=$("jclave").value.trim().toUpperCase();
  if(!name||!clave){toast("Pon nombre y clave");return;}
  let ms=parseMatchLines($("jmatches").value);if(!ms.length){toast("Pega los partidos");return;}
  document.querySelectorAll('#exactbox [data-ex]').forEach(btn=>{if(btn.classList.contains("sel"))ms[+btn.dataset.ex].exact=true;});
  const close=$("jclose").value?new Date($("jclose").value).toISOString():"";
  const existing=ST.jornadas.find(j=>j.clave===clave);
  if(existing){const old={};existing.matches.forEach(m=>old[m.home+"|"+m.away]=m.result);
    ms.forEach(m=>{if(old[m.home+"|"+m.away])m.result=old[m.home+"|"+m.away];});
    existing.name=name;existing.matches=ms;existing.closeTime=close;
  }else{if($("jedit").value==="__new"&&ST.jornadas.some(j=>j.clave===clave)){toast("Esa clave ya existe");return;}
    ST.jornadas.push({clave,name,factory:false,closeTime:close,matches:ms});}
  const ok=await sset("jornadas",ST.jornadas);toast(ok?"✓ Jornada guardada":"▲ Publica la app para guardar");ORG=true;renderActive();
}
async function delJornada(){const clave=$("jclave").value.trim().toUpperCase();const j=ST.jornadas.find(x=>x.clave===clave);
  if(!j||j.factory){toast("No se puede borrar");return;}
  if(!confirm("¿Borrar "+j.name+" y sus pronósticos?"))return;
  ST.jornadas=ST.jornadas.filter(x=>x.clave!==clave);await sset("jornadas",ST.jornadas);
  for(const id in ST.pdata){if(ST.pdata[id].preds&&ST.pdata[id].preds[clave]){delete ST.pdata[id].preds[clave];await savePlayer(id);}}
  toast("Jornada borrada");renderActive();}

async function saveBracketCfg(){const lines=$("br16").value.split("\n").map(l=>l.trim()).filter(Boolean);

async function resetBracket(){if(!confirm("¿Borrar todo el cuadro y los pronósticos de todos?"))return;

function authGate(){return $("authgate");}

async function doLogin(){
  const name=($("loginname").value||"").trim(),pass=$("loginpw").value||"";
  if(!name||!pass){setAuthMsg("Escribe tu nombre y tu contraseña","bad");return;}
  setAuthMsg("Entrando…","info");
  try{await window.__auth.signIn(name,pass);return;}  // éxito -> onAuthStateChanged
  catch(e){
    const code=(e&&e.code)||"";
    if(code==="auth/invalid-email"){setAuthMsg("Ese nombre no es válido.","bad");return;}
    if(code==="auth/too-many-requests"){setAuthMsg("Demasiados intentos. Espera un par de minutos e inténtalo otra vez.","bad");return;}
    if(code==="auth/network-request-failed"){setAuthMsg("Sin conexión a internet. Revísala e inténtalo de nuevo.","bad");return;}
    // Credencial inválida: averiguamos si el fallo es el nombre o la contraseña.
    let exists=null;
    try{const r=await fetch("/.netlify/functions/userexists",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});if(r.ok)exists=(await r.json()).exists;}catch(_){}
    if(exists===false)setAuthMsg("No existe ningún jugador con ese nombre. Escríbelo como en la lista (p. ej. Fer Taranco).","bad");
    else if(exists===true)setAuthMsg("El nombre es correcto, pero la contraseña no. Si es tu primera vez, es tu nombre en minúsculas y sin espacios.","bad");
    else setAuthMsg("Nombre o contraseña incorrectos."+(code?(" ("+code+")"):""),"bad");
  }
}
async function doChangePw(){
  const p1=$("cpw1").value||"",p2=$("cpw2").value||"";
  if(p1.length<6){setAuthMsg("La contraseña debe tener al menos 6 caracteres.","bad");return;}
  if(p1!==p2){setAuthMsg("Las dos contraseñas no coinciden.","bad");return;}
  setAuthMsg("Guardando…","info");
  try{
    await window.__auth.changePassword(p1);
    await clearMustChange();
    hideAuthGate();
    if(!BOOTED){BOOTED=true;window.__attachData();}
    await init();
    toast("✓ Contraseña actualizada");
  }catch(e){
    const code=(e&&e.code)||"";
    if(code==="auth/weak-password")setAuthMsg("Contraseña demasiado débil; prueba con otra más larga.","bad");
    else setAuthMsg("No se pudo cambiar. Cierra sesión, vuelve a entrar e inténtalo."+(code?(" ("+code+")"):""),"bad");
  }
}
async function doLogout(){try{await window.__auth.signOut();}catch(e){}}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, updatePassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// firebaseConfig (no es secreto: va en el navegador). La seguridad real está en
// las reglas RTDB (solo lectura autenticada; escritura solo desde el servidor).
const firebaseConfig = {
  apiKey: "AIzaSyA2wqNEy5X07D5ME7s5D9bHCi2BsArmoeE",
  authDomain: "quinielazo-mundialista.firebaseapp.com",
  databaseURL: "https://quinielazo-mundialista-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quinielazo-mundialista",
  storageBucket: "quinielazo-mundialista.firebasestorage.app",
  messagingSenderId: "952953695565",
  appId: "1:952953695565:web:6c09298f1a63c6b6351b04"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const auth = getAuth(app);

// Mismo criterio de normalización que el servidor (_lib/players.js): el jugador
// escribe su nombre y aquí lo convertimos al email sintético de su cuenta.
const normalizeName = n => String(n).normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().replace(/[^a-z0-9]/g,"");
const synthEmail = n => normalizeName(n) + "@quinielazo.local";

window.__auth = {
  signIn: (name, pass) => signInWithEmailAndPassword(auth, synthEmail(name), pass),
  signOut: () => signOut(auth),
  changePassword: (pass) => updatePassword(auth.currentUser, pass),
  getToken: async () => auth.currentUser ? await auth.currentUser.getIdToken() : null,
};

// Listener en vivo del nodo raíz (la lectura requiere sesión iniciada).
window.__attachData = () => onValue(ref(db, "quiniela"), (snap) => {
  if (window.__fbApplySnapshot) window.__fbApplySnapshot(snap.val());
});

// Estado de sesión: arranca la app (con claims playerId/org) o muestra el login.
onAuthStateChanged(auth, async (user) => {
  if (!user) { if (window.__onSignedOut) window.__onSignedOut(); return; }
  const tr = await user.getIdTokenResult(true);   // refresca para traer los custom claims
  let mustChange = false;
  try { const s = await get(ref(db, "users/" + user.uid + "/mustChangePassword")); mustChange = s.val() === true; } catch (e) {}
  if (window.__onSignedIn) window.__onSignedIn({ uid: user.uid, playerId: tr.claims.playerId, org: !!tr.claims.org, mustChange });
});
</script>
