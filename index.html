<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quinielazo">
<meta name="theme-color" content="#0b0b0f">
<title>Quinielazo Mundialista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0f; --panel:#15151c; --panel2:#1d1d27; --line:#2a2a36;
  --pink:#ed1b76; --pink2:#ff2e8e; --teal:#1fb89b; --teal2:#15d6a8;
  --navy:#0e1a3f; --blue:#3a5bd9; --blue2:#5b7cff;
  --gold:#f4c20d; --txt:#f3f0ee; --mut:#9a96a6; --ok:#27c08a; --bad:#ff5577;
  --safetop: max(env(safe-area-inset-top), 34px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;color:var(--txt);
  font-family:"Exo 2",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;overscroll-behavior:none}
html{background:var(--bg)}
body{padding-bottom:116px;max-width:760px;margin:0 auto;min-height:100vh;
  background:
    radial-gradient(120% 55% at 50% -8%,rgba(237,27,118,.17),transparent 55%),
    radial-gradient(85% 50% at -5% 22%,rgba(58,91,217,.16),transparent 55%),
    radial-gradient(95% 45% at 105% 104%,rgba(31,184,155,.14),transparent 55%),
    linear-gradient(180deg,#0c1330 0%,#0a0a16 42%,#08080d 100%)}
.shapes{position:fixed;inset:0;pointer-events:none;opacity:.05;z-index:0;overflow:hidden}
.shapes span{position:absolute;color:var(--pink);font-size:120px;line-height:1}
.wrap{position:relative;z-index:1}
header{padding:calc(var(--safetop) + 56px) 16px 12px;text-align:center;background:radial-gradient(120% 120% at 50% -20%, rgba(237,27,118,.22), transparent 60%)}
header .sym{letter-spacing:10px;font-size:18px}
header .sym span:nth-child(1){color:var(--pink2);text-shadow:0 0 12px rgba(255,46,142,.8)}
header .sym span:nth-child(2){color:var(--teal2);text-shadow:0 0 12px rgba(21,214,168,.8)}
header .sym span:nth-child(3){color:var(--blue2);text-shadow:0 0 12px rgba(91,124,255,.85)}
header h1{margin:6px 0 2px;font-family:"Audiowide",sans-serif;font-size:21px;font-weight:400;letter-spacing:1px;
  background:linear-gradient(180deg,#fff,#ffc8e1);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 11px rgba(237,27,118,.5)) drop-shadow(0 0 20px rgba(91,124,255,.28))}
header p{margin:0;color:var(--mut);font-size:12px}
.btnfs,.btngear{position:absolute;top:calc(var(--safetop) + 14px);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid rgba(91,124,255,.3);color:var(--txt);border-radius:11px;padding:7px 9px;font-size:15px;line-height:1;z-index:2;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.btnfs,.btngear{color:#eaf0ff}
.btngear svg{display:block;filter:drop-shadow(0 0 5px rgba(91,124,255,.55)) drop-shadow(0 0 9px rgba(255,46,142,.25))}
.btnfs{left:14px}
.btngear{right:11px;background:none;border:0;border-radius:0;padding:5px;backdrop-filter:none;-webkit-backdrop-filter:none}
.btngear svg{width:23px;height:23px}
.btngear.on{color:#fff}
.btngear.on svg{filter:drop-shadow(0 0 6px rgba(255,46,142,.85)) drop-shadow(0 0 12px rgba(255,46,142,.45))}
.gearwrap{position:fixed;inset:0;z-index:40}
.gearwrap[hidden]{display:none}
.gearback{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.gearmenu{position:absolute;top:calc(var(--safetop) + 52px);right:12px;min-width:215px;background:linear-gradient(180deg,var(--panel2),#14141c);border:1px solid var(--line);border-radius:14px;padding:6px;box-shadow:0 16px 44px rgba(0,0,0,.6),0 0 0 1px rgba(255,46,142,.15) inset;animation:fade .15s}
.gearmenu button{display:flex;align-items:center;gap:11px;width:100%;background:none;border:0;color:var(--txt);padding:13px 12px;font-size:15px;font-weight:600;border-radius:10px;text-align:left}
.gearmenu button:active{background:var(--panel)}
.gearmenu button .gi{font-size:19px;color:var(--pink2);width:22px;text-align:center}
.cog{width:1em;height:1em;vertical-align:-.15em;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.gearmenu button .gi .cog{width:20px;height:20px}
.tri{width:1em;height:1em;vertical-align:-.12em;fill:none;stroke:var(--teal2);stroke-width:1.9;stroke-linejoin:round;filter:drop-shadow(0 0 4px rgba(21,214,168,.6))}
.sec .tri{width:1.1em;height:1.1em}
.gearmenu button .gi .tri{width:20px;height:20px}
/* Barra transparente: las píldoras flotan sobre el contenido (sin fondo) */
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:22px;z-index:30;max-width:760px;margin:0 auto;
  padding:10px 18px calc(16px + env(safe-area-inset-bottom));
  background:none;border:0;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none;pointer-events:none}
/* Píldoras cápsula translúcidas, simétricas, letra Audiowide grande, brillo bajo */
.tabbar button{pointer-events:auto;flex:1 1 0;min-width:0;max-width:230px;
  border-radius:999px;color:#fff;white-space:nowrap;
  font-family:"Audiowide",sans-serif;font-size:14px;line-height:1;font-weight:400;letter-spacing:.4px;
  padding:17px 14px;text-align:center;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(11px) saturate(1.4);-webkit-backdrop-filter:blur(11px) saturate(1.4);
  transition:transform .15s,box-shadow .18s,background .18s,color .18s}
.tabbar button:active{transform:scale(.96)}
/* Ranking = turquesa/azul · Pronósticos = rosa. Tinte translúcido; algo más al activar */
.tabbar button[data-t="rank"]{color:#cdfdef;
  background:linear-gradient(180deg,rgba(31,184,155,.26),rgba(58,91,217,.2));
  border:1px solid rgba(21,214,168,.5);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.26) inset}
.tabbar button[data-t="prons"]{color:#ffd2e7;
  background:linear-gradient(180deg,rgba(237,27,118,.26),rgba(138,26,208,.2));
  border:1px solid rgba(255,46,142,.5);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.26) inset}
.tabbar button[data-t="rank"].on{color:#fff;
  background:linear-gradient(180deg,rgba(31,184,155,.5),rgba(58,91,217,.42));
  border-color:rgba(21,214,168,.8);
  box-shadow:0 2px 10px rgba(0,0,0,.32),0 0 12px rgba(31,184,155,.26),0 1px 0 rgba(255,255,255,.38) inset}
.tabbar button[data-t="prons"].on{color:#fff;
  background:linear-gradient(180deg,rgba(237,27,118,.5),rgba(138,26,208,.42));
  border-color:rgba(255,46,142,.8);
  box-shadow:0 2px 10px rgba(0,0,0,.32),0 0 12px rgba(237,27,118,.28),0 1px 0 rgba(255,255,255,.38) inset}
.view{padding:14px 14px 24px;display:none}
.view.on{display:block;animation:fade .2s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.card{background:linear-gradient(180deg,#16161f,#101019);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 16px rgba(0,0,0,.3),0 0 0 1px rgba(91,124,255,.05),0 0 22px rgba(58,91,217,.04)}
h2.sec{font-family:"Audiowide",sans-serif;font-size:12px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink2);margin:2px 0 12px;display:flex;align-items:center;gap:8px;text-shadow:0 0 14px rgba(255,46,142,.55)}
.dorsal{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:26px;border-radius:14px;background:rgba(31,184,155,.16);color:#bdffe9;border:1px solid #1fb89b66;font-weight:800;font-size:12px;padding:0 8px;font-variant-numeric:tabular-nums;box-shadow:0 0 10px rgba(31,184,155,.2),0 1px 0 rgba(255,255,255,.08) inset;text-shadow:0 0 8px rgba(21,214,168,.45)}
.dorsal .dot{margin-right:5px;font-size:10px;line-height:1;color:var(--pink2);text-shadow:0 0 7px rgba(255,46,142,.7)}
select,input{background:rgba(29,29,39,.6);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:10px;font-size:15px;width:100%;font-family:inherit}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 1px rgba(255,46,142,.35),0 0 14px rgba(237,27,118,.22)}
.row{display:flex;gap:8px;align-items:center}
/* Botones translúcidos con brillo bajo, a juego con las píldoras */
.btn{background:linear-gradient(180deg,rgba(237,27,118,.32),rgba(138,26,208,.24));color:#fff;border:1px solid rgba(255,46,142,.55);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:700;width:100%;letter-spacing:.3px;
  backdrop-filter:blur(8px) saturate(1.3);-webkit-backdrop-filter:blur(8px) saturate(1.3);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 0 12px rgba(237,27,118,.16),0 1px 0 rgba(255,255,255,.26) inset;transition:transform .15s,box-shadow .18s}
.btn:active{transform:scale(.98)}
.btn.alt{background:linear-gradient(180deg,rgba(31,184,155,.32),rgba(58,91,217,.24));border-color:rgba(21,214,168,.55);
  box-shadow:0 2px 9px rgba(0,0,0,.3),0 0 12px rgba(31,184,155,.16),0 1px 0 rgba(255,255,255,.26) inset}
.btn.ghost{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.btn.danger{background:rgba(255,85,119,.14);border:1px solid rgba(255,85,119,.45);color:#ff9db1;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.muted{color:var(--mut);font-size:12px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:6px 0 14px}
.pod{flex:1;max-width:130px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));border:1px solid var(--line);border-radius:14px 14px 0 0;text-align:center;padding:10px 6px}
.pod .nm{font-weight:700;font-size:13px;margin:6px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod .pt{color:var(--gold);font-weight:800;text-shadow:0 0 10px rgba(244,194,13,.45)}
.pod.p1{order:2;border-color:rgba(244,194,13,.7);box-shadow:0 0 0 1px rgba(244,194,13,.5) inset,0 0 22px rgba(244,194,13,.2);padding-bottom:26px}
.pod.p2{order:1;padding-bottom:14px}
.pod.p3{order:3}
.pod .medal{font-family:"Audiowide",sans-serif;font-size:22px;color:var(--gold);text-shadow:0 0 14px rgba(244,194,13,.75);line-height:1}
.st{display:inline-block;font-family:"Exo 2",sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:6px;vertical-align:middle}
.st-lock{color:#9fb0ff;background:rgba(58,91,217,.16);border:1px solid rgba(91,124,255,.4);text-shadow:0 0 8px rgba(91,124,255,.5)}
.st-edit{color:#7ff0d4;background:rgba(31,184,155,.16);border:1px solid rgba(21,214,168,.4);text-shadow:0 0 8px rgba(21,214,168,.5)}
.esp{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;color:var(--gold);border:1px solid rgba(244,194,13,.5);border-radius:5px;padding:0 5px;margin-left:4px;text-shadow:0 0 8px rgba(244,194,13,.5)}
.rkrow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.rkrow:last-child{border:0}
.rkpos{width:24px;text-align:center;font-weight:800;color:var(--mut);position:relative}
.rkpos .tie{font-size:9px;color:var(--teal2);vertical-align:super;margin-left:1px}
.rkpos .tb{font-size:13px;line-height:0;color:var(--gold);vertical-align:super;margin-left:1px;opacity:.7}
.rknm{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rkpt{font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;text-shadow:0 0 9px rgba(244,194,13,.4)}
.tag10{background:#3a2a05;color:var(--gold);border:1px solid #f4c20d55;border-radius:8px;font-size:10px;padding:2px 6px;font-weight:700}
.acc{border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden;background:rgba(255,255,255,.012);transition:border-color .18s,box-shadow .18s}
.acc.open{border-color:rgba(255,46,142,.32);box-shadow:0 0 16px rgba(237,27,118,.1)}
.acc>.h{display:flex;align-items:center;justify-content:space-between;padding:12px;background:linear-gradient(180deg,rgba(29,29,39,.9),rgba(20,20,28,.85));cursor:pointer;gap:8px}
.acc>.h .t{font-weight:700}
.acc>.h .meta{color:var(--mut);font-size:12px}
.acc>.b{display:none;padding:8px 10px 12px}
.acc.open>.b{display:block}
.acc.open>.h .chev{transform:rotate(180deg)}
.chev{transition:.15s;color:var(--mut)}
.match{padding:9px 4px;border-bottom:1px solid var(--line)}
.match:last-child{border:0}
.mt{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.mt .gr{color:var(--pink2);font-weight:800;font-size:11px;width:28px}
.mt .nm{flex:1;font-size:14px}
.mt .star{color:var(--gold);font-size:12px}
.picks{display:flex;gap:6px}
.pk{flex:1;min-width:0;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:8px 4px;font-weight:800;text-align:center;font-size:15px;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.15}
.pk .pks{font-size:15px;font-weight:800}
.pk .pkt{font-size:11px;font-weight:600;opacity:.82;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pk.on{background:linear-gradient(180deg,rgba(237,27,118,.55),rgba(138,26,208,.4));border-color:rgba(255,46,142,.7);color:#fff;box-shadow:0 0 14px rgba(237,27,118,.35),0 1px 0 rgba(255,255,255,.25) inset}
.exact{display:flex;gap:6px;align-items:center;justify-content:flex-end}
.exact input{width:46px;text-align:center;padding:8px 0;font-weight:800}
.res{font-size:11px;color:var(--mut);margin-top:5px}
.res b{color:var(--txt)}
.chip{display:inline-block;font-size:11px;padding:2px 7px;border-radius:8px;margin-left:6px}
.chip.ok{background:#0e3a2c;color:#7ff0c4}
.chip.no{background:#3a1620;color:#ff8aa3}
.chip.wait{background:#26262f;color:var(--mut)}
.bigpts{font-size:14px;color:var(--gold);font-weight:800;text-shadow:0 0 10px rgba(244,194,13,.45)}
.notice{background:rgba(237,27,118,.1);border:1px solid rgba(237,27,118,.35);color:#ffc4dd;border-radius:12px;padding:11px;font-size:12px;margin-bottom:10px;box-shadow:0 0 16px rgba(237,27,118,.12)}
.tline{height:1px;background:var(--line);margin:12px 0}
.kvr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px}
.kvr:last-child{border:0}
.kvr b{color:var(--gold)}
.bx{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:11px;padding:8px 10px;margin-bottom:6px}
.bx .tm{flex:1;font-size:14px}
.bx .tm.win{color:var(--teal2);font-weight:700;text-shadow:0 0 10px rgba(21,214,168,.5)}
.bx button{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:6px 9px;font-size:12px;white-space:nowrap}
.bx button.sel{background:linear-gradient(180deg,rgba(244,194,13,.85),rgba(244,194,13,.68));border-color:var(--gold);color:#2a1d03;font-weight:800;box-shadow:0 0 12px rgba(244,194,13,.4)}
.bx button.selg{background:linear-gradient(180deg,rgba(21,214,168,.6),rgba(31,184,155,.5));border-color:var(--teal);color:#03241d;font-weight:800;box-shadow:0 0 12px rgba(31,184,155,.35)}
.rndlbl{color:var(--pink2);font-weight:800;font-size:12px;letter-spacing:1.5px;margin:14px 0 6px;text-transform:uppercase;text-shadow:0 0 10px rgba(255,46,142,.4)}
/* Cuadro visual de la hoja de ruta (carrusel por ronda) */
.brgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.brcard{border:1px solid var(--line);border-radius:12px;padding:5px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.008))}
.brteam{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:11px 10px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:13px;font-weight:600;line-height:1.15;cursor:pointer;transition:.15s}
.brteam:active{transform:scale(.98)}
.brteam.sel{background:linear-gradient(180deg,rgba(21,214,168,.55),rgba(31,184,155,.42));border-color:var(--teal);color:#03241d;font-weight:800;box-shadow:0 0 12px rgba(31,184,155,.32)}
.brteam.tbd{color:var(--mut);border-style:dashed;cursor:default;font-style:italic;font-weight:600}
.brvs{text-align:center;color:var(--mut);font-size:9px;letter-spacing:2px;margin:3px 0;font-weight:800}
@media(max-width:360px){.brgrid{grid-template-columns:1fr}}
/* Hoja de ruta como BRACKET VERTICAL (scroll horizontal). Truco de cuadre: cada celda
   de la ronda r mide 2^r de alto, así cada cruce queda centrado entre su par de la ronda
   anterior y los conectores en L casan a cualquier altura, sin medidas a mano. */
.brk{display:flex;overflow-x:auto;padding:2px 0 12px;margin:2px -2px 0;-webkit-overflow-scrolling:touch}
.brk-col{flex:0 0 auto;width:150px;display:flex;flex-direction:column}
.brk-h{height:24px;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--pink2);text-align:center;text-shadow:0 0 10px rgba(255,46,142,.4)}
.brk-cell{--cell:68px;height:calc(var(--cell)*var(--mult));display:flex;align-items:center;position:relative;padding-right:18px;box-sizing:border-box}
.brk-card{width:100%;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.008))}
.brk-team{padding:7px 9px;font-size:12.5px;font-weight:600;line-height:1.15;cursor:pointer;border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.12s}
.brk-team:last-child{border-bottom:none}
.brk-team:active{transform:scale(.985)}
.brk-team.on{background:linear-gradient(180deg,rgba(21,214,168,.55),rgba(31,184,155,.42));border-color:var(--teal);color:#03241d;font-weight:800;box-shadow:inset 0 0 12px rgba(31,184,155,.25)}
.brk-team.tbd{color:var(--mut);font-style:italic;font-weight:600;cursor:default}
/* Resultado REAL del cruce (quién pasó): ganador con borde dorado + trofeo; el eliminado, atenuado. */
.brk-team.real{box-shadow:inset 3px 0 0 var(--gold)}
.brk-team.real:not(.on){background:rgba(244,194,13,.14);color:#ffe6a3;font-weight:800}
.brk-team.real.on{box-shadow:inset 3px 0 0 var(--gold),inset 0 0 12px rgba(31,184,155,.25)}
.brk-team.out:not(.on){opacity:.5;text-decoration:line-through;text-decoration-color:rgba(255,255,255,.3)}
.brk-team.out.on{opacity:.62}
/* Rama CANCELADA: el equipo que el jugador eligió para pasar ya está eliminado. La tarjeta y
   todo lo que ese equipo arrastra hacia la final se pinta en rojo/apagado (por ahí ya no gana). */
.brk-card.dead{opacity:.9;border-color:rgba(224,40,40,.6);background:linear-gradient(180deg,rgba(224,40,40,.16),rgba(224,40,40,.05))}
.brk-team.busted{background:linear-gradient(180deg,rgba(224,40,40,.6),rgba(190,28,28,.42));color:#fff;font-weight:800;text-decoration:line-through;text-decoration-color:rgba(255,255,255,.9);text-decoration-thickness:2px;box-shadow:inset 3px 0 0 #ff2e2e}
.brk-x{color:#fff;font-weight:900}
.brk-tr{font-size:11px;filter:drop-shadow(0 0 4px rgba(244,194,13,.6))}
.brk-ck{font-weight:900}
.brk-cell.top::after,.brk-cell.bot::after{content:"";position:absolute;left:calc(100% - 18px);width:18px;height:calc(var(--cell)*var(--mult)/2);border-right:2px solid var(--line)}
.brk-cell.top::after{top:50%;border-top:2px solid var(--line)}

let FBC={};                 // cache: clave_codificada -> valor (string JSON)
let FB_READY=false;
let _fbResolve; const FB_READY_P=new Promise(r=>_fbResolve=r);
const encKey=k=>k.replace(/:/g,"_");   // ':' no es válido en claves de Firebase
const decKey=k=>k.replace(/_/g,":");
function _waitFb(ms){return Promise.race([FB_READY_P,new Promise(r=>setTimeout(r,ms))]);}

// Lo invoca el módulo Firebase cada vez que cambian los datos compartidos (en vivo).
window.__fbApplySnapshot=function(data){
  FBC=data||{};
  if(!FB_READY){FB_READY=true;_fbResolve();return;}            // 1er snapshot: solo desbloquea init()
  loadAll().then(()=>{if(CURTAB==="rank")renderRank();});
};

async function sget(k,sh=SHARE){
  if(!sh){try{return localStorage.getItem("q_"+k);}catch(e){return null;}}
  await _waitFb(8000);
  const v=FBC[encKey(k)];return v==null?null:v;
}
async function sset(k,v,sh=SHARE){
  const val=typeof v==="string"?v:JSON.stringify(v);
  if(!sh){try{localStorage.setItem("q_"+k,val);return true;}catch(e){return false;}}
  await _waitFb(8000);
  FBC[encKey(k)]=val;                                          // optimista: refleja ya el cambio
  // Toda escritura pasa por el backend (Netlify), que verifica identidad y permisos
  // en el servidor. El cliente ya no escribe directo en la base de datos.
  try{
    const token=await window.__auth.getToken();
    if(!token)return false;
    const r=await fetch("/.netlify/functions/write",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:JSON.stringify({key:k,val})});
    return r.ok;
  }catch(e){return false;}
}
// El propio usuario limpia su flag de "cambiar contraseña" tras cambiarla.
async function clearMustChange(){
  try{const token=await window.__auth.getToken();
    await fetch("/.netlify/functions/write",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:JSON.stringify({userFlag:"mustChangePassword",val:false})});}catch(e){}
}
async function slist(pre,sh=SHARE){
  if(!sh)return [];
  await _waitFb(8000);
  const ep=encKey(pre);
  return Object.keys(FBC).filter(k=>k.indexOf(ep)===0).map(decKey);
}
function pj(v,d){if(v==null)return d;try{return JSON.parse(v)}catch(e){return d}}

let ST={jornadas:[],bracket:null,sidebet:null,pdata:{},koedit:{}};
let ME=null, MYID=null, ORG=false, openAcc={}, CURTAB="rank", RANKVIEW="total", BRROUND=0;
// Protección de ediciones locales frente al listener en vivo de Firebase:
//  DIRTY   = ids de jugador con cambios en memoria SIN guardar todavía.
//  PENDING = id -> último JSON guardado, a la espera de que el servidor lo confirme.
// Mientras un id esté en cualquiera de los dos, loadAll() conserva la copia en memoria
// y no la pisa con el snapshot del servidor (que puede ir por detrás).
let DIRTY=new Set(), PENDING={};

async function loadAll(){
  let j=pj(await sget("jornadas"),null);
  // Sembrar SOLO si la BD está vacía: nunca sobreescribir datos compartidos por
  // diferencia de versión (evita "guerras" entre clientes y pisar al organizador).
  if(!j){j=JSON.parse(JSON.stringify(FACTORY));await sset("jornadas",j);await sset("seedver",SEED_VER);}
  ST.jornadas=j;
  ST.bracket=pj(await sget("bracket"),{closeTime:"",r16:[],real:{w:{},finalScore:""}});
  // Campos nuevos para el 1-X-2 de eliminatorias (resultados y cierres por ronda).
  if(!ST.bracket.rres)ST.bracket.rres={};
  if(!ST.bracket.rmatch)ST.bracket.rmatch={};
  if(!ST.bracket.rclose)ST.bracket.rclose={};
  if(!ST.bracket.real)ST.bracket.real={w:{},finalScore:""};
  if(!ST.bracket.real.w)ST.bracket.real.w={};
  ST.sidebet=pj(await sget("sidebet"),{results:{}});
  // Override MANUAL y temporal del organizador para REABRIR el 1-X-2 de una ronda KO ya
  // cerrada (p. ej. dejar completar octavos), bloqueando partidos concretos que ya se juegan.
  // Va en una clave propia (quiniela/koedit) que el sync NO reescribe. Formato:
  //   { "<roundIdx>": { until:"<ISO opcional>", lock:[<slots que siguen cerrados>] } }
  ST.koedit=pj(await sget("koedit"),{})||{};
  const prev=ST.pdata||{};
  const np={};
  const keys=await slist("p:");
  for(const k of keys){
    const raw=await sget(k);const v=pj(raw,null);if(v==null)continue;
    const id=+k.split(":")[1];
    // Si el servidor ya devuelve exactamente lo que guardamos, soltamos la protección.
    if(PENDING[id]!=null&&raw===PENDING[id]){delete PENDING[id];DIRTY.delete(id);}
    // Edición local sin guardar, o guardado aún sin confirmar: conservamos la copia
    // en memoria para que el snapshot en vivo no borre lo que el usuario está tocando.
    if((DIRTY.has(id)||PENDING[id]!=null)&&prev[id]!=null)np[id]=prev[id];
    else np[id]=v;
  }
  // Ediciones locales cuyo nodo aún no existe en el servidor (primer guardado en curso).
  DIRTY.forEach(id=>{if(np[id]==null&&prev[id]!=null)np[id]=prev[id];});
  Object.keys(PENDING).forEach(k=>{const id=+k;if(np[id]==null&&prev[id]!=null)np[id]=prev[id];});
  ST.pdata=np;
}
function pdataOf(id){return ST.pdata[id]||(ST.pdata[id]={preds:{},bracket:{picks:{},bonus:""},sidebet:{}});}
async function savePlayer(id){
  const v=JSON.stringify(pdataOf(id));
  const ok=await sset("p:"+id,v);
  // Guardado correcto: marcamos como "pendiente de confirmar" y dejamos de tratarlo
  // como sucio; si falla, sigue protegido como edición sin guardar.
  if(ok){PENDING[id]=v;DIRTY.delete(id);}
  return ok;
}
function getPick(id,clave,idx){
  const pd=ST.pdata[id];
  if(pd&&pd.preds&&pd.preds[clave]&&pd.preds[clave][idx]!=null)return pd.preds[clave][idx];
  if(SEED[clave]&&SEED[clave][idx])return SEED[clave][idx][id-1]||"";
  return "";
}
function sidePick(id,key){
  const pd=ST.pdata[id];
  if(pd&&pd.sidebet&&pd.sidebet[key]!=null&&pd.sidebet[key]!=="")return pd.sidebet[key];
  const s=SEED_SIDE[byId[id].name];return s?(s[key]||""):"";
}

/* ============ SCORING ============ */
function parseScore(s){const m=/^(\d+)\s*-\s*(\d+)$/.exec((s||"").trim());return m?[+m[1],+m[2]]:null;}
function signOf(s){s=(s||"").trim().toLowerCase();if(s==="1"||s==="x"||s==="2")return s;const p=parseScore(s);return p?(p[0]>p[1]?"1":p[0]<p[1]?"2":"x"):null;}
function exactPts(pred,res,scale){
  const p=parseScore(pred),r=parseScore(res);if(!p||!r)return 0;
  const ex=scale?[10,5,2]:[5,3,1];
  if(p[0]===r[0]&&p[1]===r[1])return ex[0];
  const ps=p[0]>p[1]?"1":p[0]<p[1]?"2":"x", rs=r[0]>r[1]?"1":r[0]<r[1]?"2":"x";
  if(ps!==rs)return 0; if((p[0]-p[1])===(r[0]-r[1]))return ex[1]; return ex[2];
}
function jornadaScore(id,j){
  let pts=0,exact=0;
  j.matches.forEach((m,idx)=>{
    if(!m.result)return;
    const pred=getPick(id,j.clave,idx);
    if(m.exact){const e=exactPts(pred,m.result,false);pts+=e;if(e===5)exact++;}
    else{const r=signOf(m.result),p=signOf(pred);if(r&&p&&r===p)pts++;}
  });
  return {pts,exact};
}
// La eliminatoria SIEMPRE arranca en Dieciseisavos (ronda 0): el cuadro completo se
// muestra desde el principio y los cruces sin equipo aún salen como "por definir".
function startIdx(){return 0;}
// Cruces de la primera ronda (Dieciseisavos) rellenados a su tamaño completo (16),
// usando los que ya se conocen (b.r16) y dejando el resto vacíos ("por definir").
function firstRoundPairs(){const b=ST.bracket,n=ROUNDS[startIdx()].size,out=[];for(let i=0;i<n;i++){const c=(b.r16||[])[i];out.push([(c&&c.a)||"",(c&&c.b)||""]);}return out;}
function bracketScore(id){
  const b=ST.bracket;if(!b.r16.length)return {pts:0};
  const pd=ST.pdata[id];if(!pd||!pd.bracket)return {pts:0};
  const pk=pd.bracket.picks||{};let pts=0;const s=startIdx();
  for(let r=s;r<ROUNDS.length;r++){const real=(b.real.w[r]||{});
    for(let i=0;i<ROUNDS[r].size;i++){if(real[i]&&pk[r]&&pk[r][i]&&pk[r][i]===real[i])pts+=ROUNDS[r].pts;}}
  if(b.real.finalScore&&pd.bracket.bonus)pts+=exactPts(pd.bracket.bonus,b.real.finalScore,true);
  return {pts};
}
// Premios individuales: el organizador puede meter VARIOS aciertos válidos separados por
// comas (empates: p. ej. dos equipos menos goleados). Se normaliza (sin acentos, en
// minúsculas y con espacios colapsados) para que cuadre con lo que escribió el jugador,
// y se da por acertado si su respuesta coincide con CUALQUIERA de los válidos.
function normTxt(s){return (s||"").trim().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/\s+/g," ");}
function sideHit(res,pick){const p=normTxt(pick);if(!p)return false;return String(res||"").split(",").map(normTxt).filter(Boolean).some(a=>a===p);}
function sideScore(id){
  const res=ST.sidebet.results||{};let pts=0;
  SIDE.forEach(([k])=>{if(sideHit(res[k],sidePick(id,k)))pts+=10;});
  return pts;
}
function totalScore(id){
  let pts=0,exact=0,finalp=0;
  ST.jornadas.forEach(j=>{const s=jornadaScore(id,j);pts+=s.pts;exact+=s.exact;});
  // 1-X-2 de eliminatorias: cuenta 1 pt/acierto y es "puntos de fase final" (desempate §7).
  koJornadas().forEach(j=>{const s=jornadaScore(id,j);pts+=s.pts;finalp+=s.pts;});
  const bs=bracketScore(id);pts+=bs.pts;finalp+=bs.pts;
  pts+=sideScore(id);
  return {pts,exact,finalp};
}
function ranking(){
  const arr=PLAYERS.map(p=>({...p,...totalScore(p.id)}));
  arr.sort((a,b)=>b.pts-a.pts||b.exact-a.exact||b.finalp-a.finalp||a.dorsal-b.dorsal);
  return arr;
}
// La eliminatoria solo "existe" cuando hay cruces con equipos reales (no TBD).
function bracketReady(){return !!(ST.bracket&&ST.bracket.r16&&ST.bracket.r16.some(c=>c&&c.a&&c.b));}
// Emparejamientos REALES de una ronda de eliminatoria (no la hoja de ruta del jugador).
// La primera ronda activa sale del sorteo (b.r16); las siguientes, de los GANADORES
// reales (b.real.w) de la ronda anterior, que el organizador va rellenando.
function koMatchups(r){
  const b=ST.bracket,s=startIdx();
  if(r===s)return firstRoundPairs();
  // KO≥1 (octavos, cuartos, semis, final): un cruce SOLO se da por establecido desde la
  // FUENTE OFICIAL. b.rmatch[r] lo publica el sync con el LOCAL/VISITANTE oficial de
  // football-data en cuanto los dos equipos están clasificados y el choque fijado. Mientras
  // no exista, el cruce queda "por definir": así el 1-X-2 de la ronda no se abre hasta que
  // el emparejamiento es oficial y NUNCA hay que voltear votos a posteriori (a diferencia
  // de derivarlo por posición del ganador anterior, que puede salir con el local invertido).
  const rm=b.rmatch&&b.rmatch[r];const out=[];
  for(let i=0;i<ROUNDS[r].size;i++){const p=(rm&&rm[i])||["",""];out.push([p[0]||"",p[1]||""]);}
  return out;
}
// Jornadas sintéticas de eliminatoria para el 1-X-2 (mismo formato que las de grupos).
// Una ronda solo aparece cuando ya tiene emparejamientos formados: la primera en cuanto
// hay cuadro; las siguientes, cuando se conocen los ganadores reales de la previa.
function koJornadas(){
  if(!bracketReady())return [];
  const b=ST.bracket,s=startIdx(),out=[];
  for(let r=s;r<ROUNDS.length;r++){
    const ms=koMatchups(r);
    if(!ms.some(m=>m[0]&&m[1]))break;
    const rres=b.rres[r]||{};
    const matches=ms.map((m,i)=>({group:"",home:m[0]||"",away:m[1]||"",exact:false,result:rres[i]||""}));
    out.push({clave:"KO"+r,name:ROUNDS[r].name,ko:true,roundIdx:r,closeTime:(b.rclose[r]||""),matches});
  }
  return out;
}
// Reapertura MANUAL del 1-X-2 de una ronda KO (ST.koedit). Devuelve {lock:[slots]} si la
// ronda de esa "clave" (KO<r>) está reabierta ahora mismo, o null. `lock` = partidos que,
// aun con la ronda reabierta, siguen CERRADOS (ya se están jugando / han terminado).
function koReopenInfo(clave){
  const m=/^KO(\d+)$/.exec(clave||"");if(!m)return null;
  const o=(ST.koedit||{})[m[1]];if(!o)return null;
  if(o.until&&new Date(o.until)<new Date())return null; // caducó la reapertura
  return {lock:Array.isArray(o.lock)?o.lock:[]};
}
// Puntos de 1-X-2 que un jugador saca en la ronda de eliminatoria r (para el ranking por ronda).
function koRoundScore(id,r){const kj=koJornadas().find(j=>j.roundIdx===r);return kj?jornadaScore(id,kj).pts:0;}
// Puntos de un jugador en una ronda de eliminatoria concreta (avances + bonus en la final).
function roundScore(id,r){
  const b=ST.bracket;if(!b||!b.r16||!b.r16.length)return 0;
  const pd=ST.pdata[id];if(!pd||!pd.bracket)return 0;
  const pk=pd.bracket.picks||{},real=(b.real.w[r]||{});let pts=0;
  for(let i=0;i<ROUNDS[r].size;i++){if(real[i]&&pk[r]&&pk[r][i]&&pk[r][i]===real[i])pts+=ROUNDS[r].pts;}
  if(r===ROUNDS.length-1&&b.real.finalScore&&pd.bracket.bonus)pts+=exactPts(pd.bracket.bonus,b.real.finalScore,true);
  return pts;
}
// Puntos segun el segmento elegido en el ranking (mismos datos, distinta vista).
function segScore(id,view){
  if(view==="total")return totalScore(id).pts;
  if(view.indexOf("j:")===0){const j=ST.jornadas.find(x=>x.clave===view.slice(2));return j?jornadaScore(id,j).pts:0;}
  if(view.indexOf("r:")===0){const r=+view.slice(2);return roundScore(id,r)+koRoundScore(id,r);}
  return 0;
}
// Lista de segmentos disponibles para el selector (solo los que aplican).
function rankSegments(){
  const segs=[{v:"total",l:"Total"}];
  ST.jornadas.forEach(j=>segs.push({v:"j:"+j.clave,l:j.clave}));
  if(bracketReady()){
    const sh={r16:"16avos",oct:"Octavos",cua:"Cuartos",sem:"Semis",fin:"Final"};
    for(let r=startIdx();r<ROUNDS.length;r++)segs.push({v:"r:"+r,l:sh[ROUNDS[r].key]||ROUNDS[r].name});
  }
  return segs;
}
function setRankView(v){RANKVIEW=v;renderRank();}
function bestOfJornada(j){
  const total=j.matches.length;if(!total)return null;
  const done=j.matches.filter(m=>m.result).length;if(!done)return null;
  let best=-1,winners=[];
  PLAYERS.forEach(p=>{const s=jornadaScore(p.id,j).pts;if(s>best){best=s;winners=[p];}else if(s===best)winners.push(p);});
  if(best<=0)return null;
  return {best,winners,done,total,complete:done===total};
}

/* ============ HELPERS UI ============ */
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const pad=n=>String(n).padStart(3,"0");
const dch=p=>`<span class="dorsal"><i class="dot">○</i>${pad(p.dorsal)}</span>`;

function playerOptions(sel){return '<option value="">— elige tu nombre —</option>'+sortedPlayers().map(p=>`<option value="${p.id}" ${p.id==sel?"selected":""}>#${pad(p.dorsal)} · ${esc(p.name)}</option>`).join("");}

/* ============ RANKING ============ */
function renderRank(){
  const segs=rankSegments();
  if(!segs.some(s=>s.v===RANKVIEW))RANKVIEW="total";
  const total=RANKVIEW==="total";
  // Ranking del segmento elegido (en total se usan los desempates ricos).
  let r;
  if(total)r=ranking();
  else r=PLAYERS.map(p=>({...p,pts:segScore(p.id,RANKVIEW)})).sort((a,b)=>b.pts-a.pts||a.dorsal-b.dorsal);
  const top=r.slice(0,3);
  const segLabel=(segs.find(s=>s.v===RANKVIEW)||{}).l||"Total";
  const maxPts=r.length?r[0].pts:0;

  let h='<div class="card"><h2 class="sec">○ Ranking en vivo</h2>';
  // Selector de vista (Total / jornadas / rondas). Mismos datos, distinta vista.
  h+='<div class="segbar">'+segs.map(s=>`<button class="seg ${s.v===RANKVIEW?"on":""}" onclick="setRankView('${s.v}')">${esc(s.l)}</button>`).join("")+'</div>';
  if(!total){
    let extra="";
    if(RANKVIEW.indexOf("j:")===0){const jj=ST.jornadas.find(x=>x.clave===RANKVIEW.slice(2));if(jj){const dn=jj.matches.filter(m=>m.result).length;extra=` · ${dn}/${jj.matches.length} partidos jugados`;}}
    h+=`<p class="muted" style="margin:-2px 0 10px">Clasificación de <b>${esc(segLabel)}</b>${extra}.</p>`;
  }
  h+='<div class="podium">';
  [["p2",top[1],"2"],["p1",top[0],"1"],["p3",top[2],"3"]].forEach(([cls,p,med])=>{
    if(!p)return;h+=`<div class="pod ${cls}"><div class="medal">${med}</div>${dch(p)}<div class="nm">${esc(p.name)}</div><div class="pt">${p.pts} pts</div></div>`;});
  h+='</div>';
  if(!total&&maxPts===0)h+='<p class="empty" style="padding:8px 0">Aún no hay puntos en este segmento.</p>';
  // Puesto compartido en empates. En Total, "empate real" = mismos puntos, exactos y
  // puntos de fase final (los criterios de desempate del reglamento §7); en una vista
  // de jornada, basta con los mismos puntos.
  const tieKey=p=>total?(p.pts+"|"+(p.exact||0)+"|"+(p.finalp||0)):String(p.pts);
  // Conteo por puntuación total: si alguien tiene los mismos puntos que otro pero
  // NO empata (distinto escalón), su puesto se decidió por desempate (reglamento §7).
  const ptsCount={};r.forEach(p=>{ptsCount[p.pts]=(ptsCount[p.pts]||0)+1;});
  let prevKey=null,prevPos=0,anyTb=false;
  r.forEach((p,i)=>{
    const k=tieKey(p);
    const samePrev=(i>0&&k===prevKey);
    const pos=samePrev?prevPos:i+1;
    const sameNext=(i<r.length-1&&tieKey(r[i+1])===k);
    const tied=samePrev||sameNext;
    const tiebroken=total&&!tied&&ptsCount[p.pts]>1; // mismos puntos que otro, pero desempatado
    if(tiebroken)anyTb=true;
    const mark=tied?'<span class="tie">=</span>':(tiebroken?'<span class="tb" title="Mismos puntos que otros jugadores; el reglamento §7 desempata por más resultados exactos.">·</span>':'');
    h+=`<div class="rkrow"><div class="rkpos">${pos}${mark}</div>${dch(p)}<div class="rknm">${esc(p.name)}</div><div class="rkpt">${p.pts}</div></div>`;
    prevKey=k;prevPos=pos;
  });
  if(total&&anyTb)h+='<p class="muted" style="font-size:11px;margin:8px 2px 0;line-height:1.45"><b style="color:var(--gold)">·</b> Mismos puntos que otro jugador, pero por delante por desempate del reglamento (§7): <b>más resultados exactos</b>.</p>';
  h+='</div>';
  // El "mejor de la jornada · 10€" solo en la vista Total (premios de grupos).
  if(total){
    const wins=[];ST.jornadas.forEach(j=>{const b=bestOfJornada(j);if(b)wins.push([j,b]);});
    if(wins.length){h+='<div class="card"><h2 class="sec">△ Mejor de la jornada · 10€</h2>';
      wins.forEach(([j,b])=>{
        const tag=b.complete?'<span class="tag10">10€</span>':`<span class="st st-edit">provisional ${b.done}/${b.total}</span>`;
        h+=`<div class="kvr"><span>${esc(j.name)} ${tag}</span><b>${b.winners.map(w=>esc(w.name)).join(", ")} · ${b.best} pts</b></div>`;});
      h+='</div>';}
    // Ganadores OFICIALES de los premios individuales (los fija el organizador). Los de
    // equipos (más/menos goleado) pueden estar ya; los de jugador suelen resolverse al
    // final, así que hasta entonces salen como "pendiente". Si hay empate se listan todos.
    h+='<div class="card"><h2 class="sec">◆ Premios individuales · ganadores</h2>';
    const sres=ST.sidebet.results||{};
    SIDE.forEach(([k,lbl])=>{const v=(sres[k]||"").trim();
      h+=`<div class="kvr"><span>${esc(lbl)}</span>${v?('<b>'+esc(v)+'</b>'):'<span class="chip wait">pendiente</span>'}</div>`;});
    h+='<p class="muted" style="margin-top:8px">Resultados oficiales (no son pronósticos). Si hay <b>empate</b> se listan todos los ganadores; quien acertó cualquiera suma <b>+10</b>.</p>';
    h+='</div>';
  }
  h+='<p class="muted" style="text-align:center">Se actualiza solo en cuanto entran los resultados. ○ △ □</p>';
  $("v-rank").innerHTML=h;
}

/* ============ PRONÓSTICOS (ver + rellenar unificado) ============ */
function renderProns(){
  let h='<div class="card"><h2 class="sec">△ Pronósticos</h2>';
  if(!ME){h+='<div class="empty">No se ha podido identificar tu cuenta.</div><button class="btn ghost" style="margin-top:10px" onclick="doLogout()">Cerrar sesión</button></div>';$("v-prons").innerHTML=h;return;}
  h+=`<div class="row" style="justify-content:space-between"><div class="muted">Tu sesión: <b style="color:var(--txt)">${esc(byId[ME].name)}</b></div><button class="btn ghost" style="width:auto;padding:8px 12px" onclick="doLogout()">Salir</button></div></div>`;
  const tot=totalScore(ME);
  h+=`<div class="card"><div class="row" style="justify-content:space-between"><div>${dch(byId[ME])} <b>${esc(byId[ME].name)}</b></div><div class="bigpts">${tot.pts} pts</div></div></div>`;

  /* --- Jornadas: grupos y, tras la fase de grupos, las rondas de eliminatoria (1-X-2) --- */
  // En fase de grupos: orden inverso (la activa arriba). Con eliminatoria ya en marcha:
  // orden natural J1→J3→Dieciseisavos→… para que el 1-X-2 continúe debajo de la J3.
  const koJ=koJornadas();
  const jlist=koJ.length?ST.jornadas.concat(koJ):ST.jornadas.slice().reverse();
  let _firstOpen=false;
  jlist.forEach((j,ri)=>{
    // Reapertura manual del organizador (solo rondas KO): la ronda vuelve a estar abierta,
    // salvo los partidos de `lockSlots`, que siguen cerrados (ya en juego / terminados).
    const reopen=koReopenInfo(j.clave);
    const lockSlots=reopen?reopen.lock:[];
    const closed=(j.closeTime&&new Date(j.closeTime)<new Date())&&!reopen;
    const s=jornadaScore(ME,j);
    const autoOpen=!closed&&!_firstOpen;if(!closed)_firstOpen=true;
    const o=openAcc["pr"+j.clave]!==undefined?openAcc["pr"+j.clave]:autoOpen;
    const jDone=j.matches.filter(m=>m.result).length;
    const meta=closed?`<span class="st st-lock">CERRADA</span> ${jDone}/${j.matches.length} jugados · ${s.pts} pts`:(reopen?'<span class="st st-edit">REABIERTA</span> (temporal) · completa tus pronósticos':(j.closeTime?(`<span class="st st-edit">ABIERTA</span> cierra ${fmt(j.closeTime)}`):'<span class="st st-edit">ABIERTA</span>'));
    h+=`<div class="acc ${o?"open":""}"><div class="h" onclick="tacc('pr${j.clave}')"><div><span class="t">${esc(j.name)}</span> <span class="meta">${meta}</span></div><span class="chev">▾</span></div><div class="b">`;
    if(closed){
      j.matches.forEach((m,idx)=>{
        if(!m.home||!m.away){h+='<div class="match"><div class="mt"><span class="nm muted">Cruce por definir</span></div></div>';return;}
        const pred=getPick(ME,j.clave,idx);let chip;
        if(!m.result)chip='<span class="chip wait">···</span>';
        else if(m.exact){const e=exactPts(pred,m.result,false);chip=e>0?`<span class="chip ok">✓ ${e}</span>`:'<span class="chip no">✗</span>';}
        else{const ok=signOf(pred)&&signOf(pred)===signOf(m.result);chip=ok?'<span class="chip ok">✓ 1</span>':'<span class="chip no">✗</span>';}
        h+=`<div class="match"><div class="mt"><span class="gr">${m.group}</span><span class="nm">${esc(m.home)} - ${esc(m.away)} ${m.exact?'<span class="star">★</span>':""}</span></div><div class="res">Tu pronóstico: <b>${esc(pred||"—")}</b> · Resultado: <b>${esc(m.result||"···")}</b> ${chip}</div></div>`;
      });
    }else{
      if(j.ko)h+=`<p class="muted" style="margin:0 0 8px">Límite para el 1‑X‑2: al empezar esta ronda${j.closeTime?' ('+fmt(j.closeTime)+')':''}. Después se cierra.</p>`;
      j.matches.forEach((m,idx)=>{
        if(!m.home||!m.away){h+='<div class="match"><div class="mt"><span class="nm muted">Cruce por definir</span></div></div>';return;}
        const pred=getPick(ME,j.clave,idx);
        const mlk=lockSlots.indexOf(idx)>=0;   // partido bloqueado dentro de una ronda reabierta
        h+=`<div class="match"><div class="mt"><span class="gr">${m.group}</span><span class="nm">${esc(m.home)} - ${esc(m.away)} ${m.exact?'<span class="star">★ exacto</span>':""}</span>${mlk?' <span class="st st-lock">CERRADO</span>':''}</div>`;
        if(m.exact){const ps=parseScore(pred);h+=`<div class="exact"><input type="number" min="0" data-s="h" ${mlk?'disabled':''} value="${ps?ps[0]:""}"><span>-</span><input type="number" min="0" data-s="a" ${mlk?'disabled':''} value="${ps?ps[1]:""}"></div>`;}
        else{h+=picksHTML(m,pred,mlk);}
        if(mlk)h+=`<div class="res" style="margin-top:4px">Tu pronóstico: <b>${esc(pred||"—")}</b>${m.result?` · Resultado: <b>${esc(m.result)}</b>`:' · <span class="muted">en juego</span>'}</div>`;
        h+='</div>';
      });
      h+=`<button class="btn" style="margin-top:10px" onclick="saveFill('${j.clave}',this)">Guardar mi quiniela</button>`;
    }
    h+='</div></div>';
  });

  /* --- Hoja de ruta: cuadro visual (una ronda a la vez, tipo carrusel) --- */
  const b=ST.bracket;
  if(bracketReady()){
    const brClosed=b.closeTime&&new Date(b.closeTime)<new Date();
    const pd=pdataOf(ME);pd.bracket=pd.bracket||{picks:{},bonus:""};const pk=pd.bracket.picks;
    const oH=openAcc["hoja"]!==undefined?openAcc["hoja"]:false;
    const brMeta=brClosed?'<span class="st st-lock">CERRADA</span>':('<span class="st st-edit">ABIERTA</span>'+(b.closeTime?' · cierra '+fmt(b.closeTime):''));
    h+=`<div class="acc ${oH?"open":""}"><div class="h" onclick="tacc('hoja')"><div><span class="t">◇ Hoja de ruta</span> <span class="meta">${brMeta}</span></div><span class="chev">▾</span></div><div class="b">`;
    h+=`<div class="notice"><b>Límite de los cruces: al empezar los Dieciseisavos${b.closeTime?' ('+fmt(b.closeTime)+')':''}.</b> Ten <b>toda</b> la hoja de ruta rellena (hasta la final) antes de esa hora; luego los cruces se cierran. El <b>marcador del bonus</b> de la final puedes seguir cambiándolo hasta que empiece la final.</div>`;
    h+='<p class="muted" style="margin:0 0 8px">Toca quién pasa en cada cruce; el cuadro avanza solo a la ronda siguiente. Desliza en horizontal para ver Octavos, Cuartos, Semifinales y la Final.</p>';
    h+=brBracketHTML(pk,brClosed);
    // El BONUS (marcador de la final) NO se cierra con los cruces: sigue abierto hasta el
    // inicio de la final, porque aún no se sabe qué equipos la jugarán.
    const finalIdx=ROUNDS.length-1;
    const finalClose=(b.rclose&&b.rclose[finalIdx])||"";
    const bonusClosed=finalClose&&new Date(finalClose)<new Date();
    const bs=parseScore(pd.bracket.bonus);
    const bonHint=(!bonusClosed&&brClosed)?' · <b style="color:var(--teal2)">abierto hasta la final</b>':'';
    h+=`<div class="rndlbl">Bonus final · marcador exacto (10/5/2)${bonHint}</div><div class="exact" style="justify-content:flex-start"><input id="bonh" type="number" min="0" ${bonusClosed?"disabled":""} oninput="if(ME){DIRTY.add(ME);delete PENDING[ME]}" value="${bs?bs[0]:""}" style="width:54px"><span>-</span><input id="bona" type="number" min="0" ${bonusClosed?"disabled":""} oninput="if(ME){DIRTY.add(ME);delete PENDING[ME]}" value="${bs?bs[1]:""}" style="width:54px"></div>`;
    if(bonusClosed){
      h+='<p class="muted" style="margin-top:8px"><span class="st st-lock">CERRADO</span> Cuadro y bonus en solo lectura: la final ya ha empezado.</p>';
    }else if(brClosed){
      // Cruces cerrados (empezó la eliminatoria) pero el bonus sigue editable.
      h+=`<div class="notice" style="margin-top:10px">Los <b>cruces están cerrados</b> (ya empezó la eliminatoria), pero el <b>marcador del bonus</b> sigue abierto${finalClose?' hasta el inicio de la final ('+fmt(finalClose)+')':' hasta el inicio de la final'}.</div>`;
      h+=`<button class="btn alt" style="margin-top:4px" onclick="saveBracket()">Guardar el marcador del bonus</button>`;
    }else{
      h+=`<div class="row" style="margin-top:12px;gap:8px"><button class="btn alt" style="flex:1" onclick="saveBracket()">Guardar mi cuadro</button><button class="btn ghost" style="flex:0 0 auto;width:auto;padding:14px 18px" onclick="clearBracket()">Limpiar</button></div><p class="muted" style="margin-top:8px">▲ Si cambias un cruce anterior, los siguientes que dependían se reinician.</p>`;
    }
    h+='</div></div>';
  }

  /* --- Side bet: solo lectura (lo gestiona el organizador) --- */
  const oSB=openAcc["prsb"]!==undefined?openAcc["prsb"]:false;
  h+=`<div class="acc ${oSB?"open":""}"><div class="h" onclick="tacc('prsb')"><div><span class="t">Premios individuales</span> <span class="meta">+10 cada acierto</span></div><span class="chev">▾</span></div><div class="b">`;
  SIDE.forEach(([k,lbl])=>{const res=(ST.sidebet.results||{})[k];const mine=sidePick(ME,k);let chip;
    if(res){const ok=sideHit(res,mine);chip=ok?'<span class="chip ok">✓ 10</span>':'<span class="chip no">✗</span>';}else chip='<span class="chip wait">···</span>';
    h+=`<div class="kvr"><span>${lbl}</span><span>${esc(mine||"—")} ${chip}</span></div>`;});
  h+='</div></div>';

  /* --- Transparencia: pronósticos del resto (solo de jornadas ya empezadas) --- */
  h+='<div class="subhead">○ Pronósticos de los demás</div>';
  const closedJs=ST.jornadas.concat(koJornadas()).filter(j=>j.closeTime&&new Date(j.closeTime)<new Date());
  if(!closedJs.length){
    h+='<div class="notice">En cuanto empiece una jornada (su primer partido) verás aquí los pronósticos de todos los jugadores. Hasta entonces se mantienen ocultos.</div>';
  }else{
    h+='<p class="muted" style="margin:0 0 8px">Solo se muestran las jornadas ya empezadas y la hoja de ruta una vez cerrada (al empezar los dieciseisavos). Toca un jugador para ver sus pronósticos.</p>';
    sortedPlayers().forEach(p=>{
      const o=openAcc["tp"+p.id]!==undefined?openAcc["tp"+p.id]:false;
      const totp=closedJs.reduce((acc,j)=>acc+jornadaScore(p.id,j).pts,0);
      const meY=p.id===ME?' <span class="chip wait">tú</span>':'';
      h+=`<div class="acc ${o?"open":""}"><div class="h" onclick="tacc('tp${p.id}')"><div><span class="t">${dch(p)} ${esc(p.name)}${meY}</span> <span class="meta">${totp} pts</span></div><span class="chev">▾</span></div><div class="b">`;
      closedJs.forEach(j=>{
        const oj=openAcc["tpj"+p.id+"_"+j.clave]!==undefined?openAcc["tpj"+p.id+"_"+j.clave]:false;
        const sj=jornadaScore(p.id,j).pts;
        h+=`<div class="acc ${oj?"open":""}"><div class="h" onclick="event.stopPropagation();tacc('tpj${p.id}_${j.clave}')"><div><span class="t">${esc(j.name)}</span> <span class="meta">${sj} pts</span></div><span class="chev">▾</span></div><div class="b">`;
        j.matches.forEach((m,idx)=>{
          if(!m.home||!m.away)return;
          const pred=getPick(p.id,j.clave,idx);let chip='';
          if(m.result){
            if(m.exact){const e=exactPts(pred,m.result,false);chip=e>0?`<span class="chip ok">✓ ${e}</span>`:'<span class="chip no">✗</span>';}
            else{const ok=signOf(pred)&&signOf(pred)===signOf(m.result);chip=ok?'<span class="chip ok">✓ 1</span>':'<span class="chip no">✗</span>';}
          }
          h+=`<div class="kvr"><span><b style="color:var(--pink2)">${esc(m.group)}</b> ${esc(m.home)} - ${esc(m.away)} ${m.exact?'<span style="color:var(--gold)">★</span>':''}</span><span><b>${esc((pred||"—").toUpperCase())}</b> ${chip}</span></div>`;
        });
        h+='</div></div>';
      });
      // Hoja de ruta del jugador: visible para todos una vez cerrados los cruces (transparencia).
      // El bonus (marcador de la final) se revela solo al empezar la final, para que no se copie.
      if(bracketReady()&&b.closeTime&&new Date(b.closeTime)<new Date()){
        const tpk=((ST.pdata[p.id]||{}).bracket||{}).picks||{};
        const tbonus=((ST.pdata[p.id]||{}).bracket||{}).bonus||"";
        const fclose=(b.rclose&&b.rclose[ROUNDS.length-1])||"";
        const bonShow=fclose&&new Date(fclose)<new Date();
        const ob=openAcc["tpb"+p.id]!==undefined?openAcc["tpb"+p.id]:false;
        h+=`<div class="acc ${ob?"open":""}"><div class="h" onclick="event.stopPropagation();tacc('tpb${p.id}')"><div><span class="t">◇ Hoja de ruta</span> <span class="meta">cruces cerrados</span></div><span class="chev">▾</span></div><div class="b">`;
        h+=brBracketHTML(tpk,true);
        h+=`<div class="kvr" style="margin-top:8px"><span>Bonus final (marcador)</span><span><b>${bonShow?esc(tbonus||"—"):'<span class="muted" style="font-weight:600">se revela al empezar la final</span>'}</b></span></div>`;
        h+='</div></div>';
      }
      h+='</div></div>';
    });
  }

  $("v-prons").innerHTML=h;
}

/* ============ RELLENAR ============ */
function renderFill(){
  let h='<div class="card"><h2 class="sec">□ Rellenar jornada</h2>';
  h+=`<select onchange="ME=+this.value;sset('me',ME,false);renderActive()">${playerOptions(ME)}</select></div>`;
  if(!ME){h+='<div class="empty">Elige tu nombre para rellenar.</div>';$("v-fill").innerHTML=h;return;}
  ST.jornadas.slice().reverse().forEach((j,ri)=>{
    const closed=j.closeTime&&new Date(j.closeTime)<new Date();
    const o=openAcc["fill"+j.clave]!==undefined?openAcc["fill"+j.clave]:(ri===0);
    h+=`<div class="acc ${o?"open":""}"><div class="h" onclick="tacc('fill${j.clave}')"><div><span class="t">${esc(j.name)}</span> <span class="meta">${closed?"cerrada":(j.closeTime?"cierra "+fmt(j.closeTime):"sin hora de cierre")}</span></div><span class="chev">▾</span></div><div class="b">`;
    j.matches.forEach((m,idx)=>{
      const pred=getPick(ME,j.clave,idx);
      h+=`<div class="match"><div class="mt"><span class="gr">${m.group}</span><span class="nm">${esc(m.home)} - ${esc(m.away)} ${m.exact?'<span class="star">★ exacto</span>':""}</span></div>`;
      if(m.exact){const ps=parseScore(pred);h+=`<div class="exact"><input type="number" min="0" ${closed?"disabled":""} data-s="h" value="${ps?ps[0]:""}"><span>-</span><input type="number" min="0" ${closed?"disabled":""} data-s="a" value="${ps?ps[1]:""}"></div>`;}
      else{h+=picksHTML(m,pred,closed);}
      h+='</div>';
    });
    if(!closed)h+=`<button class="btn" style="margin-top:10px" onclick="saveFill('${j.clave}',this)">Guardar mi quiniela</button>`;
    else h+='<p class="muted" style="margin-top:8px">Jornada cerrada: ya no se puede editar.</p>';
    h+='</div></div>';
  });
  h+='<div class="card"><div class="subhead" style="margin-top:0">Mi side bet</div><p class="muted">Se resuelve al final del torneo (+10 por acierto).</p>';
  SIDE.forEach(([k,lbl])=>{h+=`<label class="fld">${lbl}</label><input data-sbp="${k}" value="${esc(sidePick(ME,k))}">`;});
  h+='<button class="btn alt" style="margin-top:12px" onclick="saveMySide()">Guardar mi side bet</button></div>';
  $("v-fill").innerHTML=h;
}
function setPk(btn){btn.closest(".picks").querySelectorAll(".pk").forEach(b=>b.classList.remove("on"));btn.classList.add("on");}
// Botones 1-X-2 con el NOMBRE del equipo debajo (1=local, 2=visitante, X=empate) para que
// nadie marque el signo equivocado. El valor que se guarda va en data-v ("1"/"x"/"2"); NO
// se lee del texto (saveFill usa data-v), así que la etiqueta puede ser el nombre del equipo.
function pkLabel(m,s){return s==="1"?esc(m.home):s==="2"?esc(m.away):"Empate";}
function picksHTML(m,pred,closed){return '<div class="picks">'+["1","x","2"].map(s=>`<button class="pk ${pred===s?"on":""}" data-v="${s}" ${closed?"disabled":""} onclick="setPk(this)"><span class="pks">${s.toUpperCase()}</span><span class="pkt">${pkLabel(m,s)}</span></button>`).join("")+'</div>';}
async function saveFill(clave,btn){
  const jx=ST.jornadas.find(x=>x.clave===clave)||koJornadas().find(x=>x.clave===clave);
  // Si la ronda KO está REABIERTA manualmente, se permite guardar aunque su closeTime ya pasara
  // (los partidos bloqueados van deshabilitados en el DOM, así que su pronóstico se conserva).
  const reopenS=koReopenInfo(clave);
  if(!reopenS&&jx&&jx.closeTime&&new Date(jx.closeTime)<new Date()){toast("Ronda cerrada: ya no se puede guardar");renderActive();return;}
  // Aviso si se rellena la quiniela de OTRO jugador (solo el organizador puede): evita
  // guardar en la columna equivocada por dejar el selector en otro nombre.
  if(ME!==MYID&&!confirm("Vas a guardar la quiniela de #"+pad(byId[ME].dorsal)+" "+byId[ME].name+", que no es tu cuenta. ¿Continuar?"))return;
  // REEMPLAZA la jornada entera (no fusiona): lo que se ve en el formulario es lo que se guarda.
  const body=btn.closest(".b");const pd=pdataOf(ME);pd.preds=pd.preds||{};const cur={};
  body.querySelectorAll(".match").forEach((mt,i)=>{
    const picks=mt.querySelector(".picks");
    if(picks){const on=picks.querySelector(".pk.on");if(on)cur[i]=(on.dataset.v||on.textContent.trim().toLowerCase());}
    const exh=mt.querySelector('[data-s="h"]'),exa=mt.querySelector('[data-s="a"]');
    if(exh&&exa&&exh.value!==""&&exa.value!=="")cur[i]=exh.value+"-"+exa.value;
  });
  pd.preds[clave]=cur;const ok=await savePlayer(ME);toast(ok?"✓ Quiniela guardada":"▲ Publica la app para guardar");renderActive();
}
async function saveMySide(){const pd=pdataOf(ME);pd.sidebet=pd.sidebet||{};
  document.querySelectorAll("[data-sbp]").forEach(i=>pd.sidebet[i.dataset.sbp]=i.value.trim());
  const ok=await savePlayer(ME);toast(ok?"✓ Side bet guardado":"▲ Publica la app para guardar");}

/* ============ ELIMINATORIA ============ */
function renderElim(){
  let h='<div class="card"><h2 class="sec">◇ Fase eliminatoria</h2>';
  h+=`<select onchange="ME=+this.value;sset('me',ME,false);renderActive()">${playerOptions(ME)}</select></div>`;
  if(!ME){h+='<div class="empty">Elige tu nombre.</div>';$("v-elim").innerHTML=h;return;}
  const b=ST.bracket;
  if(!b.r16||!b.r16.length){h+='<div class="notice">El organizador todavía no ha activado el cuadro. Cuando acabe la fase de grupos, vuelve por aquí.</div>';$("v-elim").innerHTML=h;return;}
  const closed=b.closeTime&&new Date(b.closeTime)<new Date();
  const pd=pdataOf(ME);pd.bracket=pd.bracket||{picks:{},bonus:""};const pk=pd.bracket.picks;
  const s=startIdx();const act=ROUNDS.slice(s);
  let rounds=[b.r16.map(x=>[x.a,x.b])];
  for(let li=0;li<act.length-1;li++){const prev=rounds[li];const w=[];
    for(let i=0;i<prev.length;i++){let sel=(pk[s+li]||{})[i];if(sel&&prev[i].indexOf(sel)<0)sel=null;w.push(sel||null);}
    const nx=[];for(let i=0;i<w.length;i+=2)nx.push([w[i],w[i+1]]);rounds.push(nx);}
  if(closed)h+='<div class="notice">El cuadro está cerrado. Solo lectura.</div>';
  act.forEach((rd,li)=>{const r=s+li;
    h+=`<div class="rndlbl">${rd.name} · ${rd.pts} pts</div>`;
    rounds[li].forEach((cr,i)=>{const sel=(pk[r]||{})[i];h+='<div style="margin-bottom:6px">';
      [0,1].forEach(side=>{const tm=cr[side];if(tm==null){h+='<div class="bx"><div class="tm muted">—</div></div>';return;}
        const isSel=sel===tm;h+=`<div class="bx"><div class="tm ${isSel?"win":""}">${esc(tm)}</div><button class="${isSel?"selg":""}" ${closed?"disabled":""} onclick="pickBr(${r},${i},'${esc(tm).replace(/'/g,"\\'")}')">${isSel?"✓ pasa":"pasa"}</button></div>`;});
      h+='</div>';});
  });
  const finalIdx=ROUNDS.length-1;
  const finalClose=(b.rclose&&b.rclose[finalIdx])||"";
  const bonusClosed=finalClose&&new Date(finalClose)<new Date();
  const bs=parseScore(pd.bracket.bonus);
  h+=`<div class="rndlbl">Bonus final · marcador exacto (10/5/2)${(!bonusClosed&&closed)?' · <b style="color:var(--teal2)">abierto hasta la final</b>':''}</div><div class="exact" style="justify-content:flex-start"><input id="bonh" type="number" min="0" ${bonusClosed?"disabled":""} oninput="if(ME){DIRTY.add(ME);delete PENDING[ME]}" value="${bs?bs[0]:""}" style="width:54px"><span>-</span><input id="bona" type="number" min="0" ${bonusClosed?"disabled":""} oninput="if(ME){DIRTY.add(ME);delete PENDING[ME]}" value="${bs?bs[1]:""}" style="width:54px"></div>`;
  if(!bonusClosed)h+=`<button class="btn alt" style="margin-top:14px" onclick="saveBracket()">${closed?"Guardar el marcador del bonus":"Guardar mi cuadro"}</button>`;
  h+=`<p class="muted" style="margin-top:8px">▲ Si cambias un cruce anterior, los siguientes que dependían se reinician.</p>`;
  $("v-elim").innerHTML=h;
}
/* Proyección del cuadro de UN jugador a partir de sus picks: 1ª ronda = sorteo real
   (b.r16, ya en orden de bracket); cada ronda siguiente se arma con los ganadores que
   ha elegido (un pick que ya no encaja en su cruce se descarta; los cruces que aún no
   existen quedan ""). ÚNICA fuente de verdad del cuadro: la usan TANTO la hoja de ruta
   en pantalla COMO el CSV del organizador, para que sea imposible que se descuadren. */
function projectedRounds(pk){
  const st=startIdx(),act=ROUNDS.slice(st);
  const rounds=[firstRoundPairs()];
  for(let li=0;li<act.length-1;li++){const prev=rounds[li],w=[];
    for(let i=0;i<prev.length;i++){let sel=(pk[st+li]||{})[i];if(sel&&prev[i].indexOf(sel)<0)sel="";w.push(sel||"");}
    const nx=[];for(let i=0;i<w.length;i+=2)nx.push([w[i],w[i+1]]);rounds.push(nx);}
  return rounds;
}
/* Cuadro de eliminatoria como BRACKET VERTICAL (columnas: Dieciseisavos → Final).
   1ª columna = cruces reales del sorteo (b.r16, en orden de bracket). Cada columna
   siguiente se arma con los ganadores que va eligiendo el jugador; los cruces que aún
   no existen quedan "por definir". El alto de cada celda (2^ronda) hace que todo cuadre. */
function brBracketHTML(pk,closed){
  const b=ST.bracket,realW=(b&&b.real&&b.real.w)||{};
  const st=startIdx(),act=ROUNDS.slice(st),rounds=projectedRounds(pk);
  // Equipos ya ELIMINADOS de verdad (perdedor de cualquier cruce KO ya resuelto). Con esto se
  // "cancela" en la hoja de ruta la rama del jugador que dependía de un equipo caído: si el
  // equipo que elegiste para pasar ya está fuera, ese cruce —y todo lo que ese equipo arrastra
  // hacia la final— no puede dar puntos, así que se pinta como cancelado (por ahí ya no ganas).
  const deadTeams=new Set();
  for(let rr=st;rr<ROUNDS.length;rr++){const rw=realW[rr]||{},rp=koMatchups(rr);
    for(let i=0;i<ROUNDS[rr].size;i++){const w=rw[i];if(!w)continue;const p=rp[i]||["",""];
      if(p[0]&&p[0]!==w)deadTeams.add(p[0]);if(p[1]&&p[1]!==w)deadTeams.add(p[1]);}}
  let h='<div class="brk">';
  for(let li=0;li<act.length;li++){const r=st+li,isLast=(li===act.length-1);
    h+=`<div class="brk-col" style="--mult:${1<<li}"><div class="brk-h">${esc(ROUNDS[r].name)}</div>`;
    const rw=realW[r]||{};            // ganador REAL de cada cruce de esta ronda (por slot)
    rounds[li].forEach((cr,i)=>{
      const cellCls=isLast?"brk-cell":("brk-cell "+(i%2===0?"top":"bot"));
      const sel=(pk[r]||{})[i]||"";
      const winT=rw[i]||"";                 // quién pasó de verdad en este cruce
      const selDead=sel&&deadTeams.has(sel); // tu elegido aquí ya está eliminado -> rama cancelada
      h+=`<div class="${cellCls}"><div class="brk-card${selDead?' dead':''}">`;
      [0,1].forEach(side=>{const tm=cr[side]||"";
        if(!tm){h+='<div class="brk-team tbd">por definir</div>';return;}
        const on=sel===tm;
        const isWin=winT&&tm===winT;                 // ganador real del cruce
        const dead=deadTeams.has(tm)&&winT!==tm;     // eliminado de verdad (no ganó este cruce)
        const busted=on&&dead;                       // elegiste este equipo y ya está fuera
        let cls="brk-team";
        if(busted)cls+=" busted"; else{if(on)cls+=" on";if(dead)cls+=" out";}
        if(isWin)cls+=" real";
        const marks=(busted?' <span class="brk-x">✕</span>':(on?' <span class="brk-ck">✓</span>':''))+(isWin?' <span class="brk-tr">🏆</span>':'');
        if(closed)h+=`<div class="${cls}">${esc(tm)}${marks}</div>`;
        else h+=`<div class="${cls}" onclick="pickBr(${r},${i},'${esc(tm).replace(/'/g,"\\'")}')">${esc(tm)}${marks}</div>`;
      });
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  // Leyenda: solo cuando ya hay algún ganador real cargado (cruces ya jugados).
  const anyReal=Object.keys(realW).some(r=>Object.values(realW[r]||{}).some(w=>w));
  if(anyReal)h+='<p class="muted" style="margin:6px 2px 0;font-size:11px">🏆 <b>quién pasó de verdad</b> (resultado oficial) · <span style="color:var(--teal2)">✓ tu pronóstico</span> · <span style="color:#ff6b6b">✕ tu equipo eliminado</span>: esa rama queda <b>cancelada</b> (por ahí ya no puedes ganar) · los eliminados salen tachados.</p>';
  return h;
}
function pickBr(r,i,tm){const pd=pdataOf(ME);pd.bracket=pd.bracket||{picks:{},bonus:""};pd.bracket.picks[r]=pd.bracket.picks[r]||{};pd.bracket.picks[r][i]=tm;
  for(let rr=r+1;rr<ROUNDS.length;rr++)pd.bracket.picks[rr]={};
  DIRTY.add(ME);delete PENDING[ME];renderActive();}
async function saveBracket(){
  // Tras los dieciseisavos los CRUCES ya no se pueden tocar (la UI los bloquea), pero el
  // BONUS sigue editable hasta el inicio de la FINAL; solo entonces se bloquea todo.
  const b=ST.bracket,fc=(b.rclose&&b.rclose[ROUNDS.length-1])||"";
  if(fc&&new Date(fc)<new Date()){toast("La final ya ha empezado: el cuadro está cerrado");renderActive();return;}
  const pd=pdataOf(ME);const bh=$("bonh"),ba=$("bona");if(bh&&ba&&bh.value!==""&&ba.value!=="")pd.bracket.bonus=bh.value+"-"+ba.value;const ok=await savePlayer(ME);toast(ok?"✓ Guardado":"▲ Publica la app para guardar");}
function setBrRound(r){BRROUND=r;renderActive();}
async function clearBracket(){
  if(ST.bracket.closeTime&&new Date(ST.bracket.closeTime)<new Date()){toast("Cuadro cerrado: ya no se puede vaciar");return;}
  if(!confirm("¿Vaciar toda tu hoja de ruta (todos los cruces y el bonus final)?"))return;
  const pd=pdataOf(ME);pd.bracket={picks:{},bonus:""};BRROUND=startIdx();
  DIRTY.add(ME);delete PENDING[ME];
  const ok=await savePlayer(ME);toast(ok?"✓ Hoja de ruta vaciada":"▲ Publica la app para guardar");renderActive();}

// Resetea la contraseña de UN jugador a su inicial llamando a la función reset-one
// con el token del organizador (el endpoint también acepta ese token, sin secreto).
async function resetPlayerPw(btn){

      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},

// Exporta a CSV los pronósticos de UNA jornada (la elegida en el selector):
// filas = partidos por grupo, columnas = jugadores. Descargable en cualquier
// momento (esté abierta o cerrada), pensado para que el organizador contraste.
// Separador ';' + BOM UTF-8 para que Excel (es) reparta columnas y respete acentos.
function downloadCSV(){
  const all=ST.jornadas.concat(koJornadas());
  const sel=$("csvjor");const clave=sel?sel.value:(all[0]&&all[0].clave);
  const j=all.find(x=>x.clave===clave);if(!j){toast("Elige una jornada");return;}
  const SEP=";";
  const cell=v=>{v=(v==null?"":String(v));return /[";\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const players=sortedPlayers();
  const recs=j.matches.map((m,idx)=>({g:j.ko?j.name:(m.group||"").replace(/\d+$/,""),idx,m}));
  recs.sort((a,b)=>a.g.localeCompare(b.g)||a.idx-b.idx);
  const rows=[["Grupo","Partido","Resultado",...players.map(p=>p.name)]];
  recs.forEach(r=>{
    const m=r.m;
    const line=[r.g,m.home+" - "+m.away+(m.exact?" ★":""),m.result||""];
    players.forEach(p=>line.push((getPick(p.id,clave,r.idx)||"").toUpperCase()));
    rows.push(line);
  });
  const csv="﻿"+rows.map(r=>r.map(cell).join(SEP)).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const d=new Date(),p2=n=>String(n).padStart(2,"0");
  const stamp=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}_${p2(d.getHours())}-${p2(d.getMinutes())}`;
  const a=document.createElement("a");
  a.href=url;a.download="quinielazo_"+j.name.replace(/\s+/g,"-")+"_"+stamp+".csv";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("✓ CSV de "+j.name+" descargado");
}
// Exporta a CSV la HOJA DE RUTA (cuadro de eliminatoria) JUGADOR POR JUGADOR:
// una sección por jugador con TODO su cuadro proyectado (sus ganadores arrastran el
// cruce a la ronda siguiente), ronda a ronda, con su elección, el ganador real y el
// bonus. Es más largo que la versión en columnas, pero mucho más fácil de leer para
// el organizador. Mismo formato (';' + BOM UTF-8) que el resto de CSV (Excel/Sheets).
function downloadBracketCSV(){
  const b=ST.bracket;
  if(!bracketReady()){toast("Aún no hay cuadro de eliminatoria");return;}
  const SEP=";";
  const cell=v=>{v=(v==null?"":String(v));return /[";\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const players=sortedPlayers();
  const st=startIdx(),act=ROUNDS.slice(st);
  const rows=[];
  rows.push(["Hoja de ruta · cuadro de eliminatoria de cada jugador"]);
  rows.push(["Una sección por jugador: sus cruces ronda a ronda (Dieciseisavos → Final), cada equipo del cruce en su columna, quién pasa según él, el ganador real y el bonus."]);
  rows.push([]);
  players.forEach(p=>{
    const pd=ST.pdata[p.id];
    const pk=(pd&&pd.bracket&&pd.bracket.picks)||{};
    // MISMA proyección que la hoja de ruta en pantalla (projectedRounds): así los cruces
    // del CSV y los del cuadro del jugador son, por construcción, idénticos.
    const rounds=projectedRounds(pk);
    rows.push(["JUGADOR","#"+pad(p.dorsal)+" "+p.name]);
    rows.push(["Ronda","Equipo 1","Equipo 2","Equipo que pasa","Ganador real"]);
    for(let li=0;li<act.length;li++){const r=st+li,real=(b.real.w[r]||{});
      rounds[li].forEach((cr,i)=>{
        // Cada equipo del cruce en SU columna (antes iban "A - B" en una sola celda).
        rows.push([ROUNDS[r].name,(cr[0]||"¿?"),(cr[1]||"¿?"),(pk[r]&&pk[r][i])||"—",real[i]||""]);
      });
    }
    rows.push(["Bonus final (marcador)","","",(pd&&pd.bracket&&pd.bracket.bonus)||"—",b.real.finalScore||""]);
    rows.push([]);   // línea en blanco entre jugadores
  });
  const csv="﻿"+rows.map(r=>r.map(cell).join(SEP)).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const d=new Date(),p2=n=>String(n).padStart(2,"0");
  const stamp=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}_${p2(d.getHours())}-${p2(d.getMinutes())}`;
  const a=document.createElement("a");
  a.href=url;a.download="quinielazo_hoja-de-ruta_"+stamp+".csv";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("✓ CSV de la hoja de ruta descargado");
}
function isSpain(m){return /españa/i.test(m.home)||/españa/i.test(m.away);}
// Elegir/desmarcar el partido de la jornada (solo uno; España siempre exacto).
function pickPJ(clave,idx){
  const j=ST.jornadas.find(x=>x.clave===clave);if(!j)return;
  const already=j.matches[idx].exact&&!isSpain(j.matches[idx]);
  j.matches.forEach((m,i)=>{
    if(isSpain(m)){m.exact=true;m.tag="espana";}
    else{const sel=(i===idx&&!already);m.exact=sel;m.tag=sel?"jornada":"";}
  });
  renderActive();
}

// El módulo de Firebase (más abajo) llama a estos callbacks según el estado de sesión.
window.__onSignedIn=async function(info){
  MYID=info.playerId!=null?+info.playerId:null;
  ME=MYID;                                       // tu cuenta; el organizador puede cambiarla en el selector
  ORG=!!info.org;
  if(info.mustChange){showChangePw();return;}   // primer acceso: forzar cambio de contraseña
  hideAuthGate();
  if(!BOOTED){BOOTED=true;window.__attachData();}// engancha el listener en vivo (lectura requiere sesión)
  await init();
};
window.__onSignedOut=function(){ME=null;ORG=false;BOOTED=false;showLogin();};

function authGate(){return $("authgate");}
function showAuthGate(html){const g=authGate();g.innerHTML=html;g.classList.add("show");}
function hideAuthGate(){authGate().classList.remove("show");}
// Mensaje visible DENTRO de la pantalla de login (el toast queda tapado por el overlay).
function setAuthMsg(msg,kind){const e=$("autherr");if(!e)return;e.textContent=msg||"";e.className="autherr"+(kind?(" "+kind):"");}
// Botón 👁 para mostrar/ocultar lo que se escribe en un campo de contraseña.
function togglePw(id,btn){const i=$(id);if(!i)return;const show=i.type==="password";i.type=show?"text":"password";btn.textContent=show?"🙈":"👁";}
const pwField=(id)=>`<div class="pwwrap"><input id="${id}" type="password" autocomplete="off" placeholder="••••••"><button type="button" class="eye" onclick="togglePw('${id}',this)" aria-label="Ver contraseña">👁</button></div>`;

function showLogin(){
  showAuthGate(`<div class="authbox">

    <div class="hint">Da igual mayúsculas, tildes o espacios: "Jose Luis", "josé luis" o "JOSE LUIS" valen igual.</div>
    <label class="fld">Contraseña</label>${pwField("loginpw")}

  </div>`);
  setTimeout(()=>{const i=$("loginpw");if(i)i.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});},0);
}
function showChangePw(){
  showAuthGate(`<div class="authbox">
    <div class="sym"><span>○</span> <span>△</span> <span>□</span></div>
    <h1>NUEVA CONTRASEÑA</h1>
    <p class="muted" style="text-align:center;margin:0 0 14px">Por seguridad, elige tu propia contraseña.</p>
    <label class="fld">Nueva contraseña (mín. 6)</label>${pwField("cpw1")}
    <label class="fld">Repítela</label>${pwField("cpw2")}
    <button class="btn" style="margin-top:14px" onclick="doChangePw()">Guardar y entrar</button>
    <div id="autherr" class="autherr"></div>
    <button class="btn ghost" style="margin-top:8px" onclick="doLogout()">Cancelar</button>
  </div>`);
}
async function doLogin(){
  const name=($("loginname").value||"").trim(),pass=$("loginpw").value||"";
  if(!name||!pass){setAuthMsg("Escribe tu nombre y tu contraseña","bad");return;}
  setAuthMsg("Entrando…","info");
  try{await window.__auth.signIn(name,pass);return;}  // éxito -> onAuthStateChanged
  catch(e){
    const code=(e&&e.code)||"";
    if(code==="auth/invalid-email"){setAuthMsg("Ese nombre no es válido.","bad");return;}
    if(code==="auth/too-many-requests"){setAuthMsg("Demasiados intentos. Espera un par de minutos e inténtalo otra vez.","bad");return;}
    if(code==="auth/network-request-failed"){setAuthMsg("Sin conexión a internet. Revísala e inténtalo de nuevo.","bad");return;}
    // Credencial inválida: averiguamos si el fallo es el nombre o la contraseña.
    let exists=null;
    try{const r=await fetch("/.netlify/functions/userexists",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});if(r.ok)exists=(await r.json()).exists;}catch(_){}
    if(exists===false)setAuthMsg("No existe ningún jugador con ese nombre. Escríbelo como en la lista (p. ej. Fer Taranco).","bad");
    else if(exists===true)setAuthMsg("El nombre es correcto, pero la contraseña no. Si es tu primera vez, es tu nombre en minúsculas y sin espacios.","bad");
    else setAuthMsg("Nombre o contraseña incorrectos."+(code?(" ("+code+")"):""),"bad");
  }
}
async function doChangePw(){
  const p1=$("cpw1").value||"",p2=$("cpw2").value||"";
  if(p1.length<6){setAuthMsg("La contraseña debe tener al menos 6 caracteres.","bad");return;}
  if(p1!==p2){setAuthMsg("Las dos contraseñas no coinciden.","bad");return;}
  setAuthMsg("Guardando…","info");
  try{
    await window.__auth.changePassword(p1);
    await clearMustChange();
    hideAuthGate();
    if(!BOOTED){BOOTED=true;window.__attachData();}
    await init();
    toast("✓ Contraseña actualizada");
  }catch(e){
    const code=(e&&e.code)||"";
    if(code==="auth/weak-password")setAuthMsg("Contraseña demasiado débil; prueba con otra más larga.","bad");
    else setAuthMsg("No se pudo cambiar. Cierra sesión, vuelve a entrar e inténtalo."+(code?(" ("+code+")"):""),"bad");
  }
}
async function doLogout(){try{await window.__auth.signOut();}catch(e){}}
</script>

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

// Mismo criterio de normalización que el servidor (_lib/players.js): el jugador

const synthEmail = n => normalizeName(n) + "@quinielazo.local";

};

// Listener en vivo del nodo raíz (la lectura requiere sesión iniciada).
window.__attachData = () => onValue(ref(db, "quiniela"), (snap) => {
  if (window.__fbApplySnapshot) window.__fbApplySnapshot(snap.val());
});

// Estado de sesión: arranca la app (con claims playerId/org) o muestra el login.

});
